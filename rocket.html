<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠팡 로켓 발주서</title>
    <style>
        :root{
            --bg:#f3f4f6; --card:#fff; --ink:#0f172a; --ink-soft:#374151; --muted:#94a3b8;
            --line:#eef2f7; --line-soft:#f1f5f9; --primary:#4f46e5; --primary-dark:#4338ca;
            --blue:#2563eb; --hover:#f8fafc;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink-soft);font-size:13.5px;-webkit-font-smoothing:antialiased;}
        .page{max-width:1720px;width:96%;margin:22px auto;}
        .card{background:var(--card);border:1px solid #edeff3;border-radius:16px;box-shadow:0 1px 3px rgba(15,23,42,.05),0 10px 30px rgba(15,23,42,.035);padding:22px 24px 10px;}
        .head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
        .title-wrap{display:flex;align-items:baseline;gap:12px;}
        .title{font-size:20px;font-weight:700;color:var(--ink);margin:0;letter-spacing:-.3px;}
        .subtitle{font-size:13px;color:var(--muted);font-weight:500;}
        .subtitle b{color:var(--primary);font-weight:600;}
        .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .btn{height:38px;padding:0 15px;border:1px solid #e2e8f0;background:#fff;color:#334155;border-radius:9px;font-size:13.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s;white-space:nowrap;}
        .btn:hover{background:var(--hover);border-color:#cbd5e1;}
        .btn:active{background:#f1f5f9;}
        .btn.danger:hover{color:#dc2626;border-color:#fecaca;background:#fef2f2;}
        .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;box-shadow:0 1px 2px rgba(79,70,229,.25);}
        .btn.primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);}
        .sep{width:1px;height:22px;background:#e2e8f0;margin:0 2px;}
        .search{position:relative;margin:0 auto 16px;width:66.67%;}
        .tabletop{display:flex;align-items:center;justify-content:flex-start;margin-bottom:8px;}
        .page-size select{height:34px;padding:0 6px;border:none;background:transparent;font-size:13px;color:#334155;cursor:pointer;outline:none;}
        .pagination{display:flex;justify-content:center;align-items:center;gap:4px;padding:16px 0 8px;flex-wrap:wrap;}
        .pagination button{min-width:34px;height:34px;padding:0 10px;border:1px solid #e2e8f0;background:#fff;color:#475569;border-radius:8px;font-size:13px;cursor:pointer;}
        .pagination button:hover:not(:disabled):not(.active){background:#f8fafc;}
        .pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;}
        .pagination button:disabled{opacity:.4;cursor:default;}
        .pagination .ellipsis{padding:0 4px;color:#94a3b8;}
        /* 발주번호 그룹 구분선: 그룹의 마지막 행 하단에 1px 검정 (border-collapse에서 위쪽 셀 우선이라 확실히 검정으로 보임) */
        tbody tr.group-end td{border-bottom:1px solid #111827;}
        /* 오른쪽 슬라이드 패널 (전체보기) */
        .side-back{position:fixed;inset:0;background:rgba(15,23,42,.35);opacity:0;pointer-events:none;transition:opacity .2s;z-index:10001;}
        .side-back.show{opacity:1;pointer-events:auto;}
        .side-panel{position:fixed;top:0;right:0;height:100vh;width:540px;max-width:92vw;background:#fff;box-shadow:-8px 0 30px rgba(15,23,42,.15);transform:translateX(100%);transition:transform .25s ease;z-index:10002;display:flex;flex-direction:column;}
        .side-panel.show{transform:translateX(0);}
        .side-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #eef2f7;font-size:15px;font-weight:600;color:#0f172a;}
        .side-head .sub{font-size:12px;font-weight:500;color:#94a3b8;margin-left:8px;}
        .side-head button{border:none;background:transparent;font-size:18px;cursor:pointer;color:#94a3b8;line-height:1;}
        .side-list{overflow-y:auto;padding:4px 4px 16px;flex:1;}
        .side-date{display:inline-block;background:#2563eb;color:#fff;font-size:12.5px;font-weight:600;padding:4px 11px;border-radius:6px;margin:14px 6px 9px;cursor:pointer;user-select:none;}
        .side-date:hover{background:#1d4ed8;}
        .side-date.sel{background:#1e3a8a;box-shadow:0 0 0 2px rgba(37,99,235,.35);}
        .side-orders{display:flex;flex-wrap:wrap;gap:8px;padding:0 8px 8px;}
        .side-order{padding:8px 12px;border:1px solid #e5e9f0;border-radius:8px;cursor:pointer;}
        .side-order:hover{background:#f8fafc;}
        .side-order.sel{background:#eef2ff;border-color:#c7d2fe;}
        .so-no{font-size:13px;font-weight:600;color:#1e293b;white-space:nowrap;}
        .so-cnt{color:#94a3b8;font-weight:500;font-size:12px;}
        .so-center{font-size:12px;color:#1e293b;margin-top:2px;}
        .search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);}
        .search input{width:100%;height:44px;padding:0 16px 0 46px;border:1px solid #e5e9f0;border-radius:10px;background:#fff;font-size:14px;color:var(--ink);outline:none;transition:border-color .12s,box-shadow .12s;}
        .search input::placeholder{color:var(--muted);}
        .search input:focus{border-color:#c7d2fe;box-shadow:0 0 0 4px rgba(99,102,241,.10);}
        .table-scroll{overflow:auto;max-height:calc(100vh - 250px);}
        table{width:100%;border-collapse:collapse;min-width:1270px;table-layout:fixed;}
        thead th{position:sticky;top:0;z-index:2;background:#f1f3f6;text-align:left;font-size:12px;font-weight:600;color:#8b94a3;padding:9px 8px;border:1px solid #dfe3ea;white-space:nowrap;overflow:hidden;}
        thead th.num,thead th.ctr{text-align:center;}
        tbody td{padding:8px 8px;border:1px solid #e8ebf1;color:var(--ink-soft);font-size:12px;white-space:nowrap;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;}
        tbody tr:hover td{background:var(--hover);}
        td.num,td.ctr{text-align:center;font-variant-numeric:tabular-nums;}
        th.num,td.num,th.ctr,td.ctr{padding-left:4px;padding-right:4px;}
        .c-created{font-size:10px;}
        td.c-created,th.c-created{text-align:center;padding-left:2px;padding-right:2px;}
        td.order-no{font-weight:600;color:#1e293b;}
        td.pname{white-space:normal;min-width:280px;max-width:460px;color:#334155;}
        .scan-zero{color:#cbd5e1;}
        .scan-pos{color:#1e293b;}
        /* 스캔 열 배지: 확정==스캔 초록(연하게), 스캔>0 & 확정>스캔 주황 */
        .scan-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;font-size:12px;font-weight:500;line-height:1;}
        .scan-green{background:#dcfce7;color:#16a34a;}
        .scan-orange{background:#ffedd5;color:#ea580c;}
        .dash{color:#cbd5e1;}
        .loc-disc{color:#e11d48;font-weight:600;}
        th.chk,td.chk{width:42px;text-align:center;padding-left:0;padding-right:0;}
        input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:var(--primary);}
        .state-row td{text-align:center;padding:48px 12px;color:var(--muted);}
        .table-scroll::-webkit-scrollbar{width:10px;height:10px;}
        .table-scroll::-webkit-scrollbar-thumb{background:#d7dee8;border-radius:8px;border:2px solid #fff;}
        .table-scroll::-webkit-scrollbar-thumb:hover{background:#c2ccd9;}
        #toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:13px 20px;border-radius:10px;font-size:13.5px;line-height:1.5;box-shadow:0 8px 24px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:9999;max-width:90vw;white-space:pre-line;text-align:center;}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .modal-back{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:10000;}
        .modal-back.show{display:flex;}
        .modal{background:#fff;border-radius:14px;padding:22px 22px 18px;width:380px;max-width:92vw;box-shadow:0 20px 50px rgba(15,23,42,.3);}
        .modal h3{margin:0 0 6px;font-size:16px;color:var(--ink);}
        .modal p{margin:0 0 14px;font-size:13px;color:var(--muted);}
        .modal input{width:100%;height:42px;padding:0 12px;border:1px solid #e2e8f0;border-radius:9px;font-size:14px;outline:none;margin-bottom:16px;}
        .modal input:focus{border-color:#c7d2fe;box-shadow:0 0 0 3px rgba(99,102,241,.1);}
        .modal-btns{display:flex;justify-content:flex-end;gap:8px;}
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="page">
        <div class="card">
            <div class="head">
                <div class="title-wrap">
                    <h1 class="title">발주서 관리</h1>
                    <span class="subtitle">전체 <b id="rowCount">0</b>행 · <span id="selCount">0</span>개 선택</span>
                </div>
                <div class="actions">
                    <button class="btn" onclick="openOrderPanel()">전체보기</button>
                    <button class="btn" onclick="loadLocations()">위치 불러오기</button>
                    <button class="btn" onclick="changeCenter()">센터변경</button>
                    <button class="btn" onclick="changeDate()">입고일 변경</button>
                    <button class="btn" onclick="printRows()">인쇄</button>
                    <button class="btn danger" onclick="deleteRows()">삭제</button>
                    <span class="sep"></span>
                    <button class="btn" onclick="saveOrders()">저장</button>
                    <button class="btn primary" onclick="document.getElementById('fileInput').click()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V6M5 12l7-7 7 7"/></svg>
                        Excel 업로드
                    </button>
                    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="uploadExcel(this)">
                </div>
            </div>

            <div class="search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
                <input id="searchInput" type="text" placeholder="발주번호 · 물류센터 · 상품명 · 상품바코드 · 위치 검색 후 Enter" onkeydown="if(event.key==='Enter')applySearch()">
            </div>

            <div class="tabletop">
                <div class="page-size">
                    <select id="pageSize" onchange="changePageSize()">
                        <option value="100" selected>100개씩</option>
                        <option value="200">200개씩</option>
                        <option value="500">500개씩</option>
                    </select>
                </div>
            </div>

            <div class="table-scroll">
                <table>
                    <colgroup>
                        <col style="width:40px"><col style="width:82px"><col style="width:78px"><col style="width:76px"><col style="width:82px"><col style="width:120px"><col><col style="width:46px"><col style="width:46px"><col style="width:52px"><col style="width:52px"><col style="width:50px"><col style="width:50px"><col style="width:84px"><col style="width:99px">
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="chk"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                            <th>발주번호</th><th>물류센터</th><th>입고예정일</th><th>상품번호</th><th class="c-barcode">상품바코드</th><th>상품명</th>
                            <th class="num">발주</th><th class="num">확정</th><th class="num">스캔</th><th class="ctr">재고</th><th class="ctr">입고1</th><th class="ctr">입고2</th><th>위치</th><th class="c-created">created_at</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"><tr class="state-row"><td colspan="15">데이터를 불러오는 중…</td></tr></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <div class="side-back" id="sideBack" onclick="closeOrderPanel()"></div>
    <div class="side-panel" id="sidePanel">
        <div class="side-head">
            <span>발주서 전체 <span class="sub" id="sideCount"></span></span>
            <button onclick="closeOrderPanel()">✕</button>
        </div>
        <div class="side-list" id="sideList"></div>
    </div>

    <div id="toast"></div>
    <div class="modal-back" id="modalBack">
        <div class="modal">
            <h3 id="mTitle"></h3>
            <p id="mDesc"></p>
            <input id="mInput" type="text">
            <div class="modal-btns">
                <button class="btn" onclick="modalResolve(null)">취소</button>
                <button class="btn primary" onclick="modalConfirm()">확인</button>
            </div>
        </div>
    </div>

    <script>
        fetch('/header').then(r=>r.text()).then(h=>{document.getElementById('header-container').innerHTML=h;}).catch(()=>{});

        let allRows=[], viewRows=[];
        let pageSize=100, currentPage=1;
        const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        const dashCell=v=>(v==null||v===''||v==='-')?'<span class="dash">-</span>':esc(v);
        const locCell=v=>(v==null||v===''||v==='-')?'<span class="dash">-</span>':(String(v).trim()==='단종'?'<span class="loc-disc">단종</span>':esc(v));
        function fmtCreatedAt(ts){
            if(!ts) return '-';
            const d=new Date(ts); if(isNaN(d.getTime())) return '-';
            const k=new Date(d.getTime()+9*3600*1000); // KST
            const p=n=>String(n).padStart(2,'0');
            return `${p(k.getUTCFullYear()%100)}-${p(k.getUTCMonth()+1)}-${p(k.getUTCDate())} ${p(k.getUTCHours())}:${p(k.getUTCMinutes())}:${p(k.getUTCSeconds())}`;
        }

        async function loadData(){
            try{
                const res=await fetch('/api/orders'); // Supabase 기반, referer=/rocket → dedup
                if(!res.ok) throw new Error('HTTP '+res.status);
                const orders=await res.json();
                allRows=[];
                for(const o of orders){
                    for(const p of (o.상품정보||[])){
                        allRows.push({발주번호:o.발주번호,물류센터:o.물류센터,입고예정일:o.입고예정일,
                            상품번호:p.상품번호,상품바코드:p.상품바코드,상품명:p.상품이름,
                            발주수량:p.발주수량,확정수량:p.확정수량,스캔수량:p.스캔수량,
                            입고1:p.입고1,입고2:p.입고2,위치:p.위치,created_at:o.created_at});
                    }
                }
                applySearch();
            }catch(e){
                document.getElementById('tbody').innerHTML=`<tr class="state-row"><td colspan="15">데이터를 불러오지 못했습니다: ${esc(e.message)}</td></tr>`;
            }
        }

        function render(){
            const tb=document.getElementById('tbody');
            const totalPages=Math.max(1,Math.ceil(viewRows.length/pageSize));
            if(currentPage>totalPages)currentPage=totalPages;
            const start=(currentPage-1)*pageSize;
            const pageRows=viewRows.slice(start,start+pageSize);
            if(pageRows.length===0){
                tb.innerHTML=`<tr class="state-row"><td colspan="15">표시할 발주 상품이 없습니다.</td></tr>`;
            }else{
                tb.innerHTML=pageRows.map((r,li)=>{
                    const i=start+li;
                    const scanN=Number(r.스캔수량)||0;
                    const conf=Number(r.확정수량)||0;
                    const scanHtml = (conf===scanN) ? `<span class="scan-badge scan-green">${scanN}</span>`
                        : (scanN>0 && conf>scanN) ? `<span class="scan-badge scan-orange">${scanN}</span>`
                        : `<span class="${scanN>0?'scan-pos':'scan-zero'}">${scanN}</span>`;
                    const ge=(viewRows[i+1]&&viewRows[i+1].발주번호!==r.발주번호)?'group-end':'';
                    return `<tr data-i="${i}" class="${ge}">
                        <td class="chk"><input type="checkbox" class="rowchk" onchange="updateSel()"></td>
                        <td class="order-no">${esc(r.발주번호)}</td><td>${esc(r.물류센터)}</td><td>${esc(r.입고예정일)}</td>
                        <td>${esc(r.상품번호)}</td><td class="c-barcode">${esc(r.상품바코드)}</td><td class="pname">${esc(r.상품명)}</td>
                        <td class="num">${esc(r.발주수량)}</td><td class="num">${esc(r.확정수량)}</td>
                        <td class="num">${scanHtml}</td>
                        <td class="ctr">${dashCell(r.재고)}</td>
                        <td class="ctr">${dashCell(r.입고1)}</td><td class="ctr">${dashCell(r.입고2)}</td><td>${locCell(r.위치)}</td><td class="c-created">${esc(fmtCreatedAt(r.created_at))}</td>
                    </tr>`;
                }).join('');
            }
            document.getElementById('rowCount').textContent=viewRows.length;
            document.getElementById('checkAll').checked=false;
            renderPagination(totalPages);
            updateSel();
        }

        function renderPagination(totalPages){
            const el=document.getElementById('pagination');
            if(viewRows.length===0){el.innerHTML='';return;}
            let html=`<button ${currentPage===1?'disabled':''} onclick="gotoPage(${currentPage-1})">이전</button>`;
            for(const p of pageWindow(currentPage,totalPages)){
                html+= p==='...' ? `<span class="ellipsis">…</span>` : `<button class="${p===currentPage?'active':''}" onclick="gotoPage(${p})">${p}</button>`;
            }
            html+=`<button ${currentPage===totalPages?'disabled':''} onclick="gotoPage(${currentPage+1})">다음</button>`;
            el.innerHTML=html;
        }
        function pageWindow(cur,total){
            const out=[];
            if(total<=7){for(let i=1;i<=total;i++)out.push(i);return out;}
            out.push(1);
            if(cur>3)out.push('...');
            for(let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++)out.push(i);
            if(cur<total-2)out.push('...');
            out.push(total);
            return out;
        }
        function gotoPage(p){
            const total=Math.max(1,Math.ceil(viewRows.length/pageSize));
            if(p<1||p>total)return;
            currentPage=p;render();
            const ts=document.querySelector('.table-scroll'); if(ts)ts.scrollTop=0;
        }
        function changePageSize(){
            pageSize=Number(document.getElementById('pageSize').value)||100;
            currentPage=1;render();
        }

        function applySearch(){
            // 콤마로 구분된 다중 검색어 → 하나라도 일치하면 표시 (OR)
            const terms=document.getElementById('searchInput').value.toLowerCase().split(',').map(t=>t.trim()).filter(Boolean);
            if(terms.length===0){ viewRows=allRows.slice(); }
            else{
                viewRows=allRows.filter(r=>{
                    const hay=[r.발주번호,r.물류센터,r.상품명,r.상품바코드,r.위치].map(v=>String(v||'').toLowerCase());
                    return terms.some(t=>hay.some(h=>h.includes(t)));
                });
            }
            currentPage=1;
            if(document.getElementById('sidePanel').classList.contains('show')) renderOrderPanel();
            render();
        }

        function toggleAll(el){document.querySelectorAll('.rowchk').forEach(c=>c.checked=el.checked);updateSel();}
        function updateSel(){
            const checks=[...document.querySelectorAll('.rowchk')];
            const n=checks.filter(c=>c.checked).length;
            document.getElementById('selCount').textContent=n;
            const all=document.getElementById('checkAll');
            all.checked=checks.length>0&&n===checks.length;all.indeterminate=n>0&&n<checks.length;
        }
        function selectedRows(){
            const out=[];
            document.querySelectorAll('#tbody tr').forEach(tr=>{const c=tr.querySelector('.rowchk');if(c&&c.checked)out.push(viewRows[Number(tr.dataset.i)]);});
            return out;
        }
        function selectedOrderNumbers(){return [...new Set(selectedRows().map(r=>r.발주번호))];}

        // ── 전체보기 슬라이드 패널 ──
        function uniqueOrders(){
            const m=new Map();
            for(const r of allRows){
                if(!m.has(r.발주번호)) m.set(r.발주번호,{발주번호:r.발주번호,물류센터:r.물류센터,입고예정일:r.입고예정일,count:0});
                m.get(r.발주번호).count++;
            }
            return [...m.values()];
        }
        function currentSearchTerms(){
            return document.getElementById('searchInput').value.split(',').map(t=>t.trim()).filter(Boolean);
        }
        function renderOrderPanel(){
            const orders=uniqueOrders();
            const terms=currentSearchTerms();
            document.getElementById('sideCount').textContent=`${orders.length}건`;
            // 입고예정일(날짜)별 그룹 → 날짜 헤더 아래 발주서를 가로로 나열
            const byDate=new Map();
            for(const o of orders){
                const d=o.입고예정일||'(미정)';
                if(!byDate.has(d)) byDate.set(d,[]);
                byDate.get(d).push(o);
            }
            let html='';
            for(const [date,list] of byDate){
                const dateSel=list.length>0&&list.every(o=>terms.includes(o.발주번호))?'sel':'';
                html+=`<div class="side-date ${dateSel}" onclick="toggleDateInSearch('${esc(date)}')">${esc(date)}</div>`;
                // 같은 날짜 안에서 지역(물류센터)별로 줄바꿈 (각 지역 = 별도 flex 행)
                const byCenter=new Map();
                for(const o of list){
                    const c=o.물류센터||'(미정)';
                    if(!byCenter.has(c)) byCenter.set(c,[]);
                    byCenter.get(c).push(o);
                }
                for(const [,corders] of byCenter){
                    html+=`<div class="side-orders">`;
                    html+=corders.map(o=>{
                        const sel=terms.includes(o.발주번호)?'sel':'';
                        return `<div class="side-order ${sel}" onclick="toggleOrderInSearch('${esc(o.발주번호)}')">
                            <div class="so-no">${esc(o.발주번호)} <span class="so-cnt">(${o.count})</span></div>
                            <div class="so-center">${esc(o.물류센터)}</div></div>`;
                    }).join('');
                    html+=`</div>`;
                }
            }
            document.getElementById('sideList').innerHTML=html;
        }
        function openOrderPanel(){
            renderOrderPanel();
            document.getElementById('sideBack').classList.add('show');
            document.getElementById('sidePanel').classList.add('show');
        }
        function closeOrderPanel(){
            document.getElementById('sideBack').classList.remove('show');
            document.getElementById('sidePanel').classList.remove('show');
        }
        function toggleOrderInSearch(no){
            const inp=document.getElementById('searchInput');
            const terms=inp.value.split(',').map(t=>t.trim()).filter(Boolean);
            const idx=terms.indexOf(no);
            if(idx===-1) terms.push(no); else terms.splice(idx,1);
            inp.value=terms.join(', ');
            applySearch(); // renderOrderPanel() 은 applySearch 내부에서 호출됨(패널 열려있을 때)
        }
        // 날짜 클릭 → 해당 날짜의 모든 발주번호 토글 (전부 선택돼있으면 해제, 아니면 전부 추가)
        function toggleDateInSearch(date){
            const nos=uniqueOrders().filter(o=>(o.입고예정일||'(미정)')===date).map(o=>o.발주번호);
            const inp=document.getElementById('searchInput');
            let terms=inp.value.split(',').map(t=>t.trim()).filter(Boolean);
            const allSel=nos.length>0&&nos.every(n=>terms.includes(n));
            if(allSel) terms=terms.filter(t=>!nos.includes(t));
            else for(const n of nos) if(!terms.includes(n)) terms.push(n);
            inp.value=terms.join(', ');
            applySearch();
        }

        let toastTimer;
        function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}

        let _modalResolve=null;
        function openModal({title,desc,value='',password=false}){
            document.getElementById('mTitle').textContent=title;
            document.getElementById('mDesc').textContent=desc||'';
            const inp=document.getElementById('mInput');inp.type=password?'password':'text';inp.value=value;
            document.getElementById('modalBack').classList.add('show');
            setTimeout(()=>inp.focus(),50);
            return new Promise(res=>{_modalResolve=res;});
        }
        function modalResolve(v){document.getElementById('modalBack').classList.remove('show');if(_modalResolve){_modalResolve(v);_modalResolve=null;}}
        function modalConfirm(){modalResolve(document.getElementById('mInput').value);}
        document.getElementById('mInput').addEventListener('keydown',e=>{if(e.key==='Enter')modalConfirm();if(e.key==='Escape')modalResolve(null);});

        // ── Excel 업로드 ──
        async function uploadExcel(input){
            const file=input.files[0];if(!file)return;
            const fd=new FormData();fd.append('file',file);
            toast('업로드 중…');
            try{
                const res=await fetch('/api/upload',{method:'POST',body:fd});
                const data=await res.json();
                toast(data.message||'업로드 완료');
                await loadData();
            }catch(e){toast('업로드 실패: '+e.message);}
            input.value='';
        }

        // ── 저장(발주리스트 엑셀) ──
        async function saveOrders(){
            // 체크된 게 있으면 그 발주서, 없으면 현재 검색/필터된 결과의 발주서를 저장
            let orderNumbers=selectedOrderNumbers();
            const fromSelection=orderNumbers.length>0;
            if(!fromSelection) orderNumbers=[...new Set(viewRows.map(r=>r.발주번호))];
            if(!orderNumbers.length){toast('저장할 발주서가 없습니다.');return;}
            try{
                const res=await fetch('/api/orders/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNumbers})});
                if(!res.ok)throw new Error('HTTP '+res.status);
                const blob=await res.blob();
                const cd=res.headers.get('Content-Disposition')||'';
                const m=cd.match(/filename\*?=(?:UTF-8'')?["']?([^"';]+)/i);
                const fname=m?decodeURIComponent(m[1]):'발주리스트.xlsx';
                const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();URL.revokeObjectURL(a.href);
                toast(`엑셀 저장 완료 (${orderNumbers.length}건${fromSelection?'':' · 검색결과'})`);
            }catch(e){toast('저장 실패: '+e.message);}
        }

        // ── 삭제(비밀번호) ──
        async function deleteRows(){
            const orderNumbers=selectedOrderNumbers();
            if(!orderNumbers.length){toast('삭제할 발주서를 선택해주세요.');return;}
            const password=await openModal({title:'발주서 삭제',desc:`${orderNumbers.length}건 삭제. 비밀번호를 입력하세요.`,password:true});
            if(password===null)return;
            try{
                const res=await fetch('/api/orders/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNumbers,password})});
                const data=await res.json();
                if(!res.ok){toast(data.error||'삭제 실패');return;}
                toast(data.message||'삭제되었습니다.');
                await loadData();
            }catch(e){toast('삭제 실패: '+e.message);}
        }

        // ── 센터변경 ──
        async function changeCenter(){
            const orderNumbers=selectedOrderNumbers();
            if(!orderNumbers.length){toast('변경할 발주서를 선택해주세요.');return;}
            const newCenter=await openModal({title:'물류센터 변경',desc:`${orderNumbers.length}건의 물류센터를 변경합니다.`});
            if(newCenter===null||!newCenter.trim())return;
            try{
                const res=await fetch('/api/orders/update-center',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNumbers,newCenter:newCenter.trim()})});
                const data=await res.json();
                toast(data.message||'변경되었습니다.');await loadData();
            }catch(e){toast('변경 실패: '+e.message);}
        }

        // ── 입고일 변경 ──
        async function changeDate(){
            const orderNumbers=selectedOrderNumbers();
            if(!orderNumbers.length){toast('변경할 발주서를 선택해주세요.');return;}
            const newDate=await openModal({title:'입고일 변경',desc:'YYYYMMDD 형식으로 입력하세요. (예: 20260710)'});
            if(newDate===null)return;
            if(!/^\d{8}$/.test(newDate)){toast('YYYYMMDD 형식이 아닙니다.');return;}
            try{
                const res=await fetch('/api/orders/update-date',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNumbers,newDate})});
                const data=await res.json();
                toast(data.message||'변경되었습니다.');await loadData();
            }catch(e){toast('변경 실패: '+e.message);}
        }

        // ── 위치 불러오기 (재고에서 바코드→위치 채우고 저장) ──
        async function loadLocations(){
            const rows=selectedRows().length?selectedRows():viewRows;
            if(!rows.length){toast('대상이 없습니다.');return;}
            const barcodes=[...new Set(rows.map(r=>r.상품바코드).filter(Boolean))];
            toast('위치 조회 중…');
            try{
                const res=await fetch('/api/inventory/locations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({barcodes})});
                const locs=await res.json();
                const map=new Map(locs.map(l=>[l.barcode,l.location]));
                let updated=0;
                for(const r of rows){
                    const loc=map.get(r.상품바코드);
                    if(loc&&loc!=='-'&&loc!==r.위치){
                        await fetch('/api/orders/update-location',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNumber:r.발주번호,barcode:r.상품바코드,location:loc})});
                        r.위치=loc;updated++;
                    }
                }
                render();
                toast(`위치 ${updated}건 업데이트`);
            }catch(e){toast('위치 불러오기 실패: '+e.message);}
        }

        // ── 인쇄 ──
        function printRows(){
            const rows=selectedRows().length?selectedRows():viewRows;
            if(!rows.length){toast('인쇄할 행이 없습니다.');return;}
            const head=['발주번호','물류센터','입고예정일','상품번호','상품바코드','상품명','발주수량','확정수량','스캔수량','입고1','입고2','위치'];
            const body=rows.map(r=>`<tr>${[r.발주번호,r.물류센터,r.입고예정일,r.상품번호,r.상품바코드,r.상품명,r.발주수량,r.확정수량,r.스캔수량,r.입고1,r.입고2,r.위치].map(v=>`<td>${esc(v)}</td>`).join('')}</tr>`).join('');
            const w=window.open('','_blank');
            w.document.write(`<html><head><title>발주서 인쇄</title><style>body{font-family:sans-serif;font-size:11px;padding:16px;}h2{font-size:16px;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #ccc;padding:5px 7px;text-align:left;}th{background:#f1f5f9;}</style></head><body><h2>발주서 (${rows.length}건)</h2><table><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table><script>window.onload=function(){window.print();}<\/script></body></html>`);
            w.document.close();
        }

        loadData();
    </script>
</body>
</html>
