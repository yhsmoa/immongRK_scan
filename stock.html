<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고관리</title>
    <style>
        :root{
            --bg:#f3f4f6; --card:#fff; --ink:#0f172a; --ink-soft:#374151; --muted:#94a3b8;
            --line:#eef2f7; --primary:#4f46e5; --primary-dark:#4338ca; --blue:#2563eb; --hover:#f8fafc;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink-soft);font-size:13.5px;-webkit-font-smoothing:antialiased;}
        .page{max-width:1720px;width:96%;margin:22px auto;}
        .card{background:var(--card);border:1px solid #edeff3;border-radius:16px;box-shadow:0 1px 3px rgba(15,23,42,.05),0 10px 30px rgba(15,23,42,.035);padding:22px 24px 18px;}
        .head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
        .title-wrap{display:flex;align-items:baseline;gap:12px;}
        .title{font-size:20px;font-weight:700;color:var(--ink);margin:0;letter-spacing:-.3px;}
        .subtitle{font-size:13px;color:var(--muted);font-weight:500;}
        .subtitle b{color:var(--primary);font-weight:600;}

        .search{position:relative;margin:0 auto 16px;width:66.67%;}
        .search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);}
        .search input{width:100%;height:44px;padding:0 16px 0 46px;border:1px solid #e5e9f0;border-radius:10px;background:#fff;font-size:14px;color:var(--ink);outline:none;transition:border-color .12s,box-shadow .12s;}
        .search input::placeholder{color:var(--muted);}
        .search input:focus{border-color:#c7d2fe;box-shadow:0 0 0 4px rgba(99,102,241,.10);}

        .tabletop{display:flex;align-items:center;justify-content:flex-start;margin-bottom:8px;}
        .page-size select{height:34px;padding:0 6px;border:none;background:transparent;font-size:13px;color:#334155;cursor:pointer;outline:none;}

        .table-scroll{overflow-x:auto;}
        table{width:100%;border-collapse:collapse;min-width:1150px;table-layout:fixed;}
        thead th{position:sticky;top:0;z-index:2;background:#f1f3f6;text-align:left;font-size:12px;font-weight:600;color:#8b94a3;padding:10px 10px;border:1px solid #dfe3ea;white-space:nowrap;overflow:hidden;}
        thead th.ctr{text-align:center;}
        tbody td{padding:8px 10px;border:1px solid #e8ebf1;color:var(--ink-soft);font-size:12.5px;white-space:nowrap;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;}
        tbody tr:hover td{background:var(--hover);}
        td.ctr{text-align:center;font-variant-numeric:tabular-nums;}
        td.pname{white-space:normal;color:#334155;cursor:pointer;}

        /* 재고 이력 — 오른쪽 슬라이드 패널 */
        .hist-back{position:fixed;inset:0;background:rgba(15,23,42,.35);opacity:0;pointer-events:none;transition:opacity .2s;z-index:10000;}
        .hist-back.show{opacity:1;pointer-events:auto;}
        .hist-modal{position:fixed;top:0;right:0;height:100vh;width:640px;max-width:94vw;background:#fff;box-shadow:-8px 0 30px rgba(15,23,42,.15);transform:translateX(100%);transition:transform .25s ease;z-index:10001;display:flex;flex-direction:column;}
        .hist-back.show .hist-modal{transform:translateX(0);}
        .hist-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #eef2f7;}
        .hist-head h3{margin:0;font-size:15.5px;color:var(--ink);}
        .hist-head .sub{font-size:12px;color:#94a3b8;margin-left:8px;font-weight:500;}
        .hist-head button{border:none;background:transparent;font-size:18px;cursor:pointer;color:#94a3b8;line-height:1;}
        .hist-body{overflow-y:auto;padding:6px 18px 16px;flex:1;min-height:0;}
        .hist-body table{width:100%;border-collapse:collapse;min-width:0;table-layout:auto;font-size:12.5px;}
        .hist-body th{position:sticky;top:0;background:#f1f3f6;color:#8b94a3;font-size:12px;font-weight:600;padding:8px 9px;border:1px solid #dfe3ea;text-align:center;}
        .hist-body td{padding:7px 9px;border:1px solid #e8ebf1;text-align:center;font-variant-numeric:tabular-nums;}
        .hist-body td.l{text-align:left;}
        .ht-add{color:#16a34a;font-weight:600;}
        .ht-deduct{color:#dc2626;font-weight:600;}
        .ht-edit{color:#2563eb;font-weight:600;}
        .hist-empty{text-align:center;color:#94a3b8;padding:36px 0;}
        td.loc{font-weight:600;color:#1e293b;}
        td.loc-edit{cursor:text;}
        td.loc-edit:hover{background:#f8faff;}
        td.loc-edit:focus{outline:none;background:#fff;box-shadow:inset 0 0 0 2px #c7d2fe;}
        td.qty-edit{cursor:text;}
        td.qty-edit:hover{background:#f8faff;}
        td.qty-edit:focus{outline:none;background:#fff;box-shadow:inset 0 0 0 2px #c7d2fe;}
        td.qty-zero{color:#cbd5e1;}                 /* 수량 0 — 회색 */
        td.qty-dirty{color:#F0492F;font-weight:600;} /* 수정됨(미저장) */
        .btn:disabled{opacity:.5;cursor:default;background:#fff;border-color:#e2e8f0;color:#94a3b8;}
        .btn:disabled:hover{background:#fff;border-color:#e2e8f0;}
        .dash{color:#cbd5e1;}
        .state-row td{text-align:center;padding:48px 12px;color:var(--muted);}
        .table-scroll::-webkit-scrollbar{width:10px;height:10px;}
        .table-scroll::-webkit-scrollbar-thumb{background:#d7dee8;border-radius:8px;border:2px solid #fff;}
        .table-scroll::-webkit-scrollbar-thumb:hover{background:#c2ccd9;}

        .pagination{display:flex;justify-content:center;align-items:center;gap:4px;padding:16px 0 4px;flex-wrap:wrap;}
        .pagination button{min-width:34px;height:34px;padding:0 10px;border:1px solid #e2e8f0;background:#fff;color:#475569;border-radius:8px;font-size:13px;cursor:pointer;}
        .pagination button:hover:not(:disabled):not(.active){background:#f8fafc;}
        .pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;}
        .pagination button:disabled{opacity:.4;cursor:default;}
        .pagination .ellipsis{padding:0 4px;color:#94a3b8;}

        /* 버튼 + 드롭다운 */
        .actions{display:flex;align-items:center;gap:8px;}
        .btn{height:38px;padding:0 15px;border:1px solid #e2e8f0;background:#fff;color:#334155;border-radius:9px;font-size:13.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s;white-space:nowrap;}
        .btn:hover{background:var(--hover);border-color:#cbd5e1;}
        .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;box-shadow:0 1px 2px rgba(79,70,229,.25);}
        .btn.primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);}
        .btn.danger:not(:disabled){color:#dc2626;border-color:#fecaca;}
        .btn.danger:not(:disabled):hover{background:#fef2f2;border-color:#fca5a5;}
        th.chk,td.chk{width:44px;text-align:center;padding-left:0;padding-right:0;}
        input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:var(--primary);}
        .xlsx-drop{position:relative;display:inline-block;}
        .xlsx-menu{position:absolute;top:100%;right:0;margin-top:6px;min-width:160px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.12);padding:6px;display:none;z-index:50;}
        .xlsx-menu::before{content:"";position:absolute;top:-6px;left:0;right:0;height:6px;} /* hover 브릿지 */
        .xlsx-drop:hover .xlsx-menu{display:block;}
        .xlsx-menu button{display:block;width:100%;text-align:left;background:none;border:none;padding:9px 12px;border-radius:7px;font-size:13.5px;color:#334155;cursor:pointer;}
        .xlsx-menu button:hover{background:var(--hover);}
        .xlsx-menu .dd-sep{height:1px;background:#eef2f7;margin:4px 6px;}

        /* 토스트 */
        #toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:13px 20px;border-radius:10px;font-size:13.5px;line-height:1.5;box-shadow:0 8px 24px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:9999;max-width:90vw;white-space:pre-line;text-align:center;}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="page">
        <div class="card">
            <div class="head">
                <div class="title-wrap">
                    <h1 class="title">재고관리</h1>
                    <span class="subtitle">전체 <b id="rowCount">0</b>개</span>
                </div>
                <div class="actions">
                    <button class="btn" id="locSaveBtn" onclick="saveSelectedLoc()">위치저장</button>
                    <button class="btn" onclick="location.href='/stockScan'">재고스캔</button>
                    <div class="xlsx-drop">
                        <button class="btn primary">
                            xlsx
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                        </button>
                        <div class="xlsx-menu">
                            <button onclick="uploadStock('add')">재고 추가</button>
                            <button onclick="uploadStock('deduct')">재고 차감</button>
                            <div class="dd-sep"></div>
                            <button onclick="downloadTemplate()">xlsx 양식</button>
                        </div>
                    </div>
                    <button class="btn danger" id="delBtn" onclick="deleteSelected()" disabled>삭제</button>
                    <button class="btn" id="saveBtn" onclick="saveAllQty()" disabled>저장</button>
                </div>
            </div>
            <input type="file" id="stockFile" accept=".xlsx" style="display:none">
            <div id="toast"></div>

            <div class="search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
                <input id="searchInput" type="text" placeholder="위치 · 상품번호 · 바코드 · 상품명 검색 후 Enter (콤마로 여러 개)" onkeydown="if(event.key==='Enter')applySearch()">
            </div>

            <div class="tabletop">
                <div class="page-size">
                    <select id="pageSize" onchange="changePageSize()">
                        <option value="100" selected>100개씩</option>
                        <option value="200">200개씩</option>
                        <option value="500">500개씩</option>
                    </select>
                </div>
            </div>

            <div class="table-scroll">
                <table>
                    <colgroup>
                        <col style="width:44px"><col style="width:140px"><col style="width:130px"><col style="width:150px"><col><col style="width:90px"><col style="width:90px"><col style="width:200px">
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="chk"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                            <th>위치</th><th>상품번호</th><th>바코드</th><th>상품명</th><th class="ctr">수량</th><th class="ctr">시즌</th><th>비고</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"><tr class="state-row"><td colspan="8">데이터를 불러오는 중…</td></tr></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        fetch('/header').then(r=>r.text()).then(h=>{document.getElementById('header-container').innerHTML=h;}).catch(()=>{});

        let allRows=[], viewRows=[];
        let pageSize=100, currentPage=1;
        const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        const dashCell=v=>(v==null||v===''||v==='-')?'<span class="dash">-</span>':esc(v);
        // 수량 비교: null(빈칸)과 0을 구별
        const qtyEq=(a,b)=>(a==null&&b==null)||(a!=null&&b!=null&&Number(a)===Number(b));

        async function loadData(){
            try{
                const res=await fetch('/api/stocks'); // rk_stocks 테이블
                if(!res.ok) throw new Error('HTTP '+res.status);
                const items=await res.json();
                allRows=items.map(it=>({
                    id:it.id, 위치:it.location, 상품번호:it.skuId, 바코드:it.barcode, 상품명:it.itemName,
                    수량:it.qty==null?null:Number(it.qty), origQty:it.qty==null?null:Number(it.qty), 시즌:it.season, 비고:it.note
                }));
                applySearch();
            }catch(e){
                document.getElementById('tbody').innerHTML=`<tr class="state-row"><td colspan="7">데이터를 불러오지 못했습니다: ${esc(e.message)}</td></tr>`;
            }
        }

        function render(){
            const tb=document.getElementById('tbody');
            const totalPages=Math.max(1,Math.ceil(viewRows.length/pageSize));
            if(currentPage>totalPages)currentPage=totalPages;
            const start=(currentPage-1)*pageSize;
            const pageRows=viewRows.slice(start,start+pageSize);
            if(pageRows.length===0){
                tb.innerHTML=`<tr class="state-row"><td colspan="8">표시할 재고가 없습니다.</td></tr>`;
            }else{
                tb.innerHTML=pageRows.map(r=>`<tr>
                    <td class="chk"><input type="checkbox" class="rowchk" data-id="${esc(r.id)}" onchange="updateDelBtn()"></td>
                    <td class="loc loc-edit" contenteditable="true" data-id="${esc(r.id)}" data-orig="${esc(r.위치||'')}" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}if(event.key==='Escape'){this.textContent=this.dataset.orig;this.blur();}" onblur="saveLoc('${esc(r.id)}',this)">${esc(r.위치||'')}</td>
                    <td>${esc(r.상품번호)}</td>
                    <td>${esc(r.바코드)}</td>
                    <td class="pname" title="클릭하면 재고 변경 이력을 봅니다" onclick="openHistory('${esc(r.바코드)}','${esc(String(r.상품명||'').replace(/'/g,'&#39;'))}')">${esc(r.상품명)}</td>
                    <td class="ctr qty-edit${r.수량===0?' qty-zero':''}${!qtyEq(r.수량,r.origQty)?' qty-dirty':''}" contenteditable="true" data-id="${esc(r.id)}" data-orig="${r.origQty==null?'':esc(r.origQty)}" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}if(event.key==='Escape'){this.textContent=this.dataset.orig;this.blur();}" onblur="saveQtyCell('${esc(r.id)}',this)">${r.수량==null?'':esc(r.수량)}</td>
                    <td class="ctr">${dashCell(r.시즌)}</td>
                    <td>${dashCell(r.비고)}</td>
                </tr>`).join('');
            }
            document.getElementById('rowCount').textContent=viewRows.length;
            document.getElementById('checkAll').checked=false;
            renderPagination(totalPages);
            updateSaveBtn();
            updateDelBtn();
        }

        function renderPagination(totalPages){
            const el=document.getElementById('pagination');
            if(viewRows.length===0){el.innerHTML='';return;}
            let html=`<button ${currentPage===1?'disabled':''} onclick="gotoPage(${currentPage-1})">이전</button>`;
            for(const p of pageWindow(currentPage,totalPages)){
                html+= p==='...' ? `<span class="ellipsis">…</span>` : `<button class="${p===currentPage?'active':''}" onclick="gotoPage(${p})">${p}</button>`;
            }
            html+=`<button ${currentPage===totalPages?'disabled':''} onclick="gotoPage(${currentPage+1})">다음</button>`;
            el.innerHTML=html;
        }
        function pageWindow(cur,total){
            const out=[];
            if(total<=7){for(let i=1;i<=total;i++)out.push(i);return out;}
            out.push(1);
            if(cur>3)out.push('...');
            for(let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++)out.push(i);
            if(cur<total-2)out.push('...');
            out.push(total);
            return out;
        }
        function gotoPage(p){
            const total=Math.max(1,Math.ceil(viewRows.length/pageSize));
            if(p<1||p>total)return;
            currentPage=p;render();
            const ts=document.querySelector('.table-scroll'); if(ts)ts.scrollTop=0;
        }
        function changePageSize(){
            pageSize=Number(document.getElementById('pageSize').value)||100;
            currentPage=1;render();
        }

        function applySearch(){
            const terms=document.getElementById('searchInput').value.toLowerCase().split(',').map(t=>t.trim()).filter(Boolean);
            if(terms.length===0){ viewRows=allRows.slice(); }
            else{
                viewRows=allRows.filter(r=>{
                    const hay=[r.위치,r.상품번호,r.바코드,r.상품명,r.시즌,r.비고].map(v=>String(v||'').toLowerCase());
                    return terms.some(t=>hay.some(h=>h.includes(t)));
                });
            }
            currentPage=1;
            render();
        }

        // ── 체크박스 선택 + 삭제 ──
        function toggleAll(el){
            document.querySelectorAll('.rowchk').forEach(c=>c.checked=el.checked);
            updateDelBtn();
        }
        function updateDelBtn(){
            const checks=[...document.querySelectorAll('.rowchk')];
            const n=checks.filter(c=>c.checked).length;
            const btn=document.getElementById('delBtn');
            if(btn) btn.disabled=n===0;
            const all=document.getElementById('checkAll');
            if(all){ all.checked=checks.length>0&&n===checks.length; all.indeterminate=n>0&&n<checks.length; }
        }
        async function deleteSelected(){
            const ids=[...document.querySelectorAll('.rowchk')].filter(c=>c.checked).map(c=>c.dataset.id);
            if(!ids.length){ toast('삭제할 항목을 선택하세요.'); return; }
            if(!confirm(`선택한 ${ids.length}건을 삭제하시겠습니까?`)) return;
            const btn=document.getElementById('delBtn'); if(btn) btn.disabled=true;
            try{
                const res=await fetch('/api/stocks/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids})});
                const data=await res.json().catch(()=>({}));
                if(!res.ok) throw new Error(data.error||'삭제 실패');
                toast(`${data.deleted ?? ids.length}건 삭제되었습니다.`);
                await loadData();
            }catch(e){ updateDelBtn(); toast('삭제 실패: '+e.message); }
        }

        // ── 위치 일괄 저장 (체크된 행의 위치를 지정값으로 변경) ──
        async function saveSelectedLoc(){
            const ids=[...document.querySelectorAll('.rowchk')].filter(c=>c.checked).map(c=>c.dataset.id);
            if(!ids.length){ toast('위치를 저장할 항목을 체크하세요.'); return; }
            const input=prompt(`선택한 ${ids.length}개 항목의 위치를 입력하세요.`);
            if(input==null) return;
            const location=input.trim();
            if(!location){ toast('위치를 입력하세요.'); return; }
            const btn=document.getElementById('locSaveBtn'); const org=btn?btn.textContent:'';
            if(btn){ btn.disabled=true; btn.textContent='저장 중…'; }
            try{
                const res=await fetch('/api/stocks/batch-update-location',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids, location})});
                const data=await res.json().catch(()=>({}));
                if(!res.ok) throw new Error(data.error||'저장 실패');
                const idSet=new Set(ids.map(String));
                for(const r of allRows){ if(idSet.has(String(r.id))) r.위치=location; }
                applySearch();
                toast(`위치 저장 완료 (${data.updated??ids.length}건)`);
            }catch(e){ toast('위치 저장 실패: '+e.message); }
            finally{ if(btn){ btn.disabled=false; btn.textContent=org; } }
        }

        // ── 위치 인라인 수정 (셀 클릭 편집) ──
        async function saveLoc(id,cell){
            const row=allRows.find(r=>String(r.id)===String(id));
            const val=String(cell.textContent).trim();
            const orig=cell.dataset.orig||'';
            if(val===orig){ cell.textContent=orig; return; }
            if(!val){ cell.textContent=orig; toast('위치를 입력하세요.'); return; }
            try{
                const res=await fetch('/api/stocks/'+encodeURIComponent(id)+'/location',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:val})});
                const data=await res.json().catch(()=>({}));
                if(!res.ok) throw new Error(data.error||'저장 실패');
                if(row) row.위치=val;
                cell.dataset.orig=val; cell.textContent=val;
                toast('위치 수정 완료');
            }catch(e){ cell.textContent=orig; toast('위치 수정 실패: '+e.message); }
        }

        // ── 수량 인라인 수정 (셀 클릭 편집, 저장 버튼으로 일괄 저장) ──
        function saveQtyCell(id,cell){
            const row=allRows.find(r=>String(r.id)===String(id));
            const orig=cell.dataset.orig;
            const text=String(cell.textContent).trim();
            let n; // null=빈칸, 숫자=수량(0 포함)
            if(text===''){ n=null; }
            else{
                const raw=text.replace(/[^0-9]/g,'');
                if(raw===''){ cell.textContent=orig; return; }
                n=parseInt(raw,10);
                if(!Number.isFinite(n)||n<0){ cell.textContent=orig; return; }
            }
            cell.textContent=n==null?'':String(n);
            if(row) row.수량=n;
            cell.classList.toggle('qty-zero', n===0);
            cell.classList.toggle('qty-dirty', row && !qtyEq(n,row.origQty));
            updateSaveBtn();
        }
        function hasDirty(){ return allRows.some(r=>!qtyEq(r.수량,r.origQty)); }
        function updateSaveBtn(){
            const btn=document.getElementById('saveBtn');
            if(!btn) return;
            const dirty=hasDirty();
            btn.disabled=!dirty;
            btn.classList.toggle('primary', dirty);
        }
        async function saveAllQty(){
            const updates=allRows.filter(r=>!qtyEq(r.수량,r.origQty)).map(r=>({id:r.id, qty:r.수량==null?null:Number(r.수량)}));
            if(!updates.length){ toast('수정된 수량이 없습니다.'); return; }
            const btn=document.getElementById('saveBtn'); if(btn) btn.disabled=true;
            try{
                const res=await fetch('/api/stocks/batch-update-qty',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({updates})});
                const data=await res.json().catch(()=>({}));
                if(!res.ok) throw new Error(data.error||'저장 실패');
                allRows.forEach(r=>{ r.origQty=r.수량==null?null:Number(r.수량); });
                render();
                toast(`수량 ${data.updated ?? updates.length}건 저장 완료`);
            }catch(e){ updateSaveBtn(); toast('저장 실패: '+e.message); }
        }
        // 저장 안 된 수정이 있으면 페이지 이탈 시 경고
        window.addEventListener('beforeunload', function(e){
            if(hasDirty()){ e.preventDefault(); e.returnValue=''; return ''; }
        });

        // ── 토스트 ──
        let toastTimer;
        function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3200);}

        // ── xlsx 양식 다운로드 ──
        function downloadTemplate(){
            const a=document.createElement('a');
            a.href='/api/stocks/template';
            a.download='재고업로드양식.xlsx';
            document.body.appendChild(a);a.click();a.remove();
        }

        // ── 재고 추가/차감 업로드 ──
        let uploadMode=null;
        function uploadStock(mode){
            uploadMode=mode;
            document.getElementById('stockFile').click();
        }
        document.getElementById('stockFile').addEventListener('change', async function(){
            const file=this.files[0];
            this.value='';
            if(!file||!uploadMode)return;
            if(!file.name.endsWith('.xlsx')){toast('Excel(.xlsx) 파일만 업로드 가능합니다.');return;}
            const fd=new FormData();fd.append('file',file);fd.append('mode',uploadMode);
            toast(uploadMode==='add'?'재고 추가 처리 중…':'재고 차감 처리 중…');
            try{
                const res=await fetch('/api/stocks/upload',{method:'POST',body:fd});
                const data=await res.json();
                if(!res.ok)throw new Error(data.error||'업로드 실패');
                toast(data.message||'완료');
                await loadData();
            }catch(e){toast('업로드 실패: '+e.message);}
            uploadMode=null;
        });

        // ── 재고 변경 이력 (상품명 클릭) ──
        const TYPE_LABEL={add:['입고/추가','ht-add'],deduct:['차감','ht-deduct'],adjust:['직접수정','ht-edit']};
        function fmtTs(ts){
            if(!ts)return '';
            const d=new Date(ts);
            if(isNaN(d.getTime()))return String(ts);
            const p=n=>String(n).padStart(2,'0');
            return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
        }
        async function openHistory(barcode,name){
            if(!barcode)return;
            document.getElementById('histTitle').textContent=name||barcode;
            document.getElementById('histSub').textContent=barcode;
            document.getElementById('histBody').innerHTML='<div class="hist-empty">불러오는 중…</div>';
            document.getElementById('histBack').classList.add('show');
            try{
                const res=await fetch('/api/stocks/history?barcode='+encodeURIComponent(barcode));
                const list=await res.json();
                if(!res.ok)throw new Error(list.error||'이력 조회 실패');
                if(!list.length){ document.getElementById('histBody').innerHTML='<div class="hist-empty">기록된 이력이 없습니다.</div>'; return; }
                const rows=list.map(h=>{
                    const [label,cls]=TYPE_LABEL[h.changeType]||[h.changeType||'-',''];
                    const diff=(h.qtyAfter??0)-(h.qtyBefore??0);
                    const diffTxt=(h.changeType==='deduct')?`-${h.qty??Math.abs(diff)}`:(h.changeType==='add')?`+${h.qty??diff}`:(diff>0?'+'+diff:String(diff));
                    return `<tr>
                        <td>${esc(fmtTs(h.createdAt))}</td>
                        <td><span class="${cls}">${esc(label)}</span></td>
                        <td>${esc(h.location||'-')}</td>
                        <td class="${cls}">${esc(diffTxt)}</td>
                        <td>${h.qtyBefore==null?'-':esc(h.qtyBefore)} → ${h.qtyAfter==null?'-':esc(h.qtyAfter)}</td>
                        <td class="l">${esc(h.note||'')}</td>
                    </tr>`;
                }).join('');
                document.getElementById('histBody').innerHTML=`<table>
                    <thead><tr><th>일시</th><th>유형</th><th>위치</th><th>변동</th><th>이전 → 이후</th><th>비고</th></tr></thead>
                    <tbody>${rows}</tbody></table>`;
            }catch(e){
                document.getElementById('histBody').innerHTML=`<div class="hist-empty">${esc(e.message)}</div>`;
            }
        }
        function closeHistory(){ document.getElementById('histBack').classList.remove('show'); }

        loadData();
    </script>

    <!-- 재고 이력 모달 -->
    <div class="hist-back" id="histBack" onclick="if(event.target.id==='histBack')closeHistory()">
        <div class="hist-modal">
            <div class="hist-head">
                <h3>재고 이력 · <span id="histTitle"></span><span class="sub" id="histSub"></span></h3>
                <button onclick="closeHistory()">✕</button>
            </div>
            <div class="hist-body" id="histBody"></div>
        </div>
    </div>
</body>
</html>
