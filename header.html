<style>
    /* 전 페이지 배경색 통일 */
    body{background:#FBFAF9 !important;}
    .site-topbar{height:2px;background:linear-gradient(90deg,#F0492F,#FF7A5C);}
    .site-header{position:sticky;top:0;z-index:100;background:rgba(251,250,249,.82);
        -webkit-backdrop-filter:saturate(180%) blur(14px);backdrop-filter:saturate(180%) blur(14px);
        border-bottom:1px solid #EEECE9;
        font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;}
    .site-nav{max-width:1200px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
    .site-brand{display:flex;align-items:center;gap:9px;flex-shrink:0;text-decoration:none;color:#1C1B1A;}
    .site-brand .dot{width:9px;height:9px;border-radius:3px;background:#F0492F;}
    .site-brand span{font-weight:800;font-size:15px;letter-spacing:-.02em;white-space:nowrap;}
    .site-menu{display:flex;gap:2px;align-items:center;flex-wrap:nowrap;}
    .site-menu a.m-link{font-size:13px;font-weight:600;padding:7px 9px;border-radius:9px;white-space:nowrap;
        text-decoration:none;color:#78736F;transition:background .15s,color .15s;display:inline-block;}
    .site-menu a.m-link:hover{background:#F3F1EE;color:#1C1B1A;}
    .site-menu a.m-link.active{color:#F0492F;background:#FDEBE6;}
    .m-item{position:relative;}
    .m-item::after{content:"";position:absolute;top:100%;left:0;right:0;height:8px;} /* hover 브릿지 */
    .m-dropdown{display:none;position:absolute;top:100%;left:0;margin-top:6px;min-width:150px;background:#fff;
        border:1px solid #EEECE9;border-radius:10px;box-shadow:0 8px 24px rgba(28,27,26,.10);padding:6px;z-index:110;}
    .m-item:hover .m-dropdown{display:block;}
    .m-dropdown a{display:block;padding:8px 12px;border-radius:7px;font-size:13px;color:#4A4643;text-decoration:none;white-space:nowrap;}
    .m-dropdown a:hover{background:#F5F3F1;}
    @media (max-width:900px){ .site-nav{padding:0 20px;} }
</style>

<div class="site-topbar"></div>
<header class="site-header">
    <nav class="site-nav">
        <a href="/" class="site-brand"><span class="dot"></span><span>아이엠몽 로켓</span></a>
        <div class="site-menu">
            <a href="/" class="m-link" data-path="/">홈</a>
            <a href="/summary" class="m-link" data-path="/summary">요약</a>
            <div class="m-item" data-path="/rocket,/newOrder">
                <a href="/rocket" class="m-link">발주서</a>
                <div class="m-dropdown">
                    <a href="/newOrder">신규 발주서</a>
                    <a href="/rocket">전체 발주서</a>
                </div>
            </div>
            <a href="/scan" class="m-link" data-path="/scan">바코드 스캔</a>
            <a href="/shipScan" class="m-link" data-path="/shipScan">출고스캔</a>
            <a href="/shipment" class="m-link" data-path="/shipment">쉽먼트</a>
            <a href="/importChina" class="m-link" data-path="/importChina">중국입고</a>
            <div class="m-item" data-path="/inboundList,/inboundArrange,/stockArrange">
                <a href="/inboundList" class="m-link">CN입고</a>
                <div class="m-dropdown">
                    <a href="/inboundList">입고리스트</a>
                    <a href="/inboundArrange">입고정리</a>
                    <a href="/stockArrange">재고정리</a>
                </div>
            </div>
            <a href="/inventory" class="m-link" data-path="/inventory">상품관리</a>
            <div class="m-item" data-path="/stock,/stockScan">
                <a href="/stock" class="m-link">재고관리</a>
                <div class="m-dropdown">
                    <a href="/stockScan">재고스캔</a>
                    <a href="/stock">전체재고</a>
                </div>
            </div>
            <a href="/warehouse" class="m-link" data-path="/warehouse">쿠팡 물류센터</a>
            <a href="/salesdata" class="m-link" data-path="/salesdata">판매데이터</a>
            <a href="/shortage" class="m-link" data-path="/shortage">상품부족</a>
        </div>
    </nav>
</header>
<!-- 현재 경로 active 표시: innerHTML 로 주입돼도 실행되도록 img onload 사용 -->
<img alt="" style="display:none" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
    onload="(function(){var p=location.pathname;document.querySelectorAll('.site-menu [data-path]').forEach(function(el){var ps=el.getAttribute('data-path').split(',');if(ps.indexOf(p)>-1){var l=el.matches('a')?el:el.querySelector('a.m-link');if(l)l.classList.add('active');}});})()">
