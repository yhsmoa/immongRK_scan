<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이엠몽 로켓</title>
    <style>
        :root{
            --bg:#FBFAF9; --ink:#1C1B1A; --accent:#F0492F; --accent-soft:#FDEBE6;
            --line:#EEECE9; --line2:#EBE8E4; --muted:#6E6A67; --muted2:#918D89; --muted3:#78736F;
        }
        *{box-sizing:border-box;}
        body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
            font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;
            -webkit-font-smoothing:antialiased;}

        main{max-width:1200px;margin:0 auto;padding:56px 32px 80px;}
        .hero{margin-bottom:44px;max-width:640px;}
        .badge{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border:1px solid var(--line2);
            border-radius:999px;background:#fff;margin-bottom:20px;}
        .badge .d{width:6px;height:6px;border-radius:50%;background:var(--accent);}
        .badge span{font-size:11px;font-weight:700;letter-spacing:.14em;color:#8A8683;}
        .hero h1{margin:0;font-size:42px;line-height:1.08;font-weight:800;letter-spacing:-.035em;}
        .hero p{margin:14px 0 0;font-size:16px;line-height:1.6;color:var(--muted);font-weight:500;}

        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
        .card{position:relative;display:flex;flex-direction:column;padding:26px;background:#fff;
            border:1px solid var(--line);border-radius:18px;min-height:188px;text-decoration:none;
            transition:transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s,border-color .25s;}
        .card:hover{transform:translateY(-4px);border-color:#F7C9BE;box-shadow:0 18px 40px -20px rgba(28,27,26,.28);}
        .card-top{display:flex;align-items:flex-start;justify-content:space-between;}
        .card-ico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;
            background:#F5F3F1;color:#4A4643;transition:background .25s,color .25s;}
        .card:hover .card-ico{background:var(--accent-soft);color:var(--accent);}
        .card-num{font-family:ui-monospace,Menlo,monospace;font-size:12px;font-weight:600;color:#C6C2BE;}
        .card-body{margin-top:auto;padding-top:26px;}
        .card-body h3{margin:0;font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--ink);}
        .card-body p{margin:6px 0 0;font-size:13.5px;line-height:1.5;color:var(--muted2);font-weight:500;}
        .card-arrow{position:absolute;right:22px;bottom:22px;color:var(--accent);opacity:0;transform:translateX(-6px);
            transition:opacity .25s,transform .25s;display:flex;}
        .card:hover .card-arrow{opacity:1;transform:translateX(0);}

        @media (max-width:900px){ .grid{grid-template-columns:1fr;} main{padding:40px 20px 60px;} nav{padding:0 20px;} .hero h1{font-size:34px;} }
    </style>
</head>
<body>
    <div id="header-container"></div>

    <main>
        <section class="hero">
            <div class="badge">
                <div class="d"></div>
                <span>IMMONG ROCKET</span>
            </div>
            <h1>아이엠몽 님</h1>
            <p>안녕하세요 :)</p>
        </section>

        <section class="grid">
            <a class="card" href="/rocket">
                <div class="card-top">
                    <div class="card-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg></div>
                    <span class="card-num">01</span>
                </div>
                <div class="card-body"><h3>발주서 관리</h3><p>발주서 업로드 및 조회</p></div>
                <div class="card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg></div>
            </a>

            <a class="card" href="/scan">
                <div class="card-top">
                    <div class="card-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10"/></svg></div>
                    <span class="card-num">02</span>
                </div>
                <div class="card-body"><h3>바코드 스캔</h3><p>상품 바코드 스캔 및 관리</p></div>
                <div class="card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg></div>
            </a>

            <a class="card" href="/shipment">
                <div class="card-top">
                    <div class="card-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></div>
                    <span class="card-num">03</span>
                </div>
                <div class="card-body"><h3>쉽먼트</h3><p>스캔된 상품 및 박스 관리</p></div>
                <div class="card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg></div>
            </a>

            <a class="card" href="/importChina">
                <div class="card-top">
                    <div class="card-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10.189V14"/><path d="M12 2v3"/><path d="M19 13V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6"/><path d="M19.38 20A11.6 11.6 0 0 0 21 14l-8.188-3.639a2 2 0 0 0-1.624 0L3 14a11.6 11.6 0 0 0 2.81 7.76"/><path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1 .6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg></div>
                    <span class="card-num">04</span>
                </div>
                <div class="card-body"><h3>중국입고</h3><p>중국 입고 상품 관리</p></div>
                <div class="card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg></div>
            </a>

            <a class="card" href="/stock">
                <div class="card-top">
                    <div class="card-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg></div>
                    <span class="card-num">05</span>
                </div>
                <div class="card-body"><h3>재고관리</h3><p>재고 관리 및 조회</p></div>
                <div class="card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg></div>
            </a>

            <a class="card" href="/shortage">
                <div class="card-top">
                    <div class="card-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div>
                    <span class="card-num">06</span>
                </div>
                <div class="card-body"><h3>상품부족</h3><p>부족 상품 조회 및 관리</p></div>
                <div class="card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg></div>
            </a>


            <a class="card" href="/warehouse">
                <div class="card-top">
                    <div class="card-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 8.35V20a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8.35A2 2 0 0 1 3.26 6.5l8-3.2a2 2 0 0 1 1.48 0l8 3.2A2 2 0 0 1 22 8.35Z"/><path d="M6 18h12"/><path d="M6 14h12"/><rect width="12" height="12" x="6" y="10"/></svg></div>
                    <span class="card-num">08</span>
                </div>
                <div class="card-body"><h3>쿠팡 물류센터</h3><p>물류센터 재고 관리</p></div>
                <div class="card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg></div>
            </a>

            <a class="card" href="#">
                <div class="card-top">
                    <div class="card-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></div>
                    <span class="card-num">09</span>
                </div>
                <div class="card-body"><h3>생성예정</h3><p>생성 예정 기능</p></div>
                <div class="card-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg></div>
            </a>
        </section>
    </main>

    <script>
        fetch('/header').then(r=>r.text()).then(h=>{document.getElementById('header-container').innerHTML=h;}).catch(()=>{});
    </script>
</body>
</html>
