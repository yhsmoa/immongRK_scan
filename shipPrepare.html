<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출고준비</title>
    <style>
        /* 태블릿 사용성 개선안 반영 (독립 파일 — 다른 페이지와 서로 영향 없음) */
        :root{
            --bg:#eef0f6; --card:#fff; --ink:#1e2233; --ink-soft:#5a6178; --muted:#a0a6bd;
            --line:#e4e7f0; --primary:#4f46e5; --primary-dark:#4338ca; --hover:#f6f7fc;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;}
        .page{max-width:1720px;width:96%;margin:18px auto;}
        .card{background:var(--card);border:1px solid #e4e7f0;border-radius:18px;box-shadow:0 2px 8px rgba(30,34,51,.05);padding:20px 22px;}

        /* 헤더 + 진행률 */
        .head{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
        .title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin:0;}
        .meta{font-size:14px;color:#7a8199;}
        .meta strong{color:var(--primary);}
        .spacer{flex:1;}
        .prog{display:flex;align-items:center;gap:10px;}
        .prog .lbl{font-size:14px;color:#7a8199;}
        .prog .val{font-size:15px;font-weight:700;}
        .prog .track{width:160px;height:8px;background:var(--line);border-radius:99px;overflow:hidden;}
        .prog .fill{height:100%;background:var(--primary);border-radius:99px;transition:width .2s;}

        /* 좌우 5:5 */
        .split{display:flex;gap:18px;align-items:flex-start;}
        .left{flex:1 1 0;min-width:0;}
        .right{flex:1 1 0;min-width:0;}
        @media (max-width:900px){ .split{flex-direction:column;} .left,.right{flex:none;width:100%;} }

        .sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;}
        .sec-head .h{font-size:15px;font-weight:600;color:#7a8199;}
        .sec-head .sub{font-size:13px;color:var(--muted);}

        /* 위치 대형 카드 */
        .loc-card{background:var(--primary);border-radius:20px;padding:20px 26px;color:#fff;
            box-shadow:0 12px 28px rgba(79,70,229,.28);margin-bottom:14px;}
        .loc-card .lbl{font-size:15px;font-weight:600;opacity:.8;letter-spacing:2px;}
        .loc-card .big{font-size:72px;font-weight:700;line-height:1.05;letter-spacing:1px;margin-top:4px;word-break:break-all;}

        /* 상품 카드 — 바코드 배지 → 상품명 → 담아야 할 수량 */
        .prod-card{background:#fff;border:1px solid #e4e7f0;border-radius:18px;padding:18px 22px;margin-bottom:14px;}
        .prod-card .codes{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
        .bc-badge{font-size:16px;font-weight:700;color:#4f46e5;font-variant-numeric:tabular-nums;white-space:nowrap;}
        .prod-card .name{font-size:24px;font-weight:600;line-height:1.4;letter-spacing:-.3px;word-break:break-word;}
        .need-row{display:flex;align-items:center;gap:10px;margin-top:14px;}
        .need-row .k{font-size:14px;color:#7a8199;font-weight:600;}
        .need-row .v{font-size:44px;font-weight:800;color:var(--primary);line-height:1;margin-left:auto;font-variant-numeric:tabular-nums;}

        /* 준비 / 재고 입력 */
        .inputs{display:flex;gap:14px;margin-bottom:12px;}
        .inputbtn{flex:1;text-align:left;cursor:pointer;border:2px solid var(--line);background:#fff;
            border-radius:18px;padding:16px 20px;font-family:inherit;transition:transform .08s,border-color .12s;}
        .inputbtn:active{transform:scale(.98);}
        .inputbtn .k{font-size:15px;font-weight:600;color:#7a8199;margin-bottom:4px;}
        .inputbtn .num{font-size:42px;font-weight:700;line-height:1;color:#c4c8d6;font-variant-numeric:tabular-nums;}
        .inputbtn.filled-prep{border-color:#86d5a3;background:#f0fdf4;}
        .inputbtn.filled-prep .num{color:var(--ink);}
        .inputbtn.filled-stock{border-color:#f0c98a;background:#fff7ed;}
        .inputbtn.filled-stock .num{color:var(--ink);}

        /* 이전 / 없음 / 다음 — 준비·재고 바로 아래 */
        .nav-row{display:flex;gap:12px;}
        .nav-btn{flex:1;height:64px;border-radius:16px;font-family:inherit;font-size:20px;font-weight:700;
            cursor:pointer;border:2px solid var(--line);background:#fff;color:#5a6178;transition:transform .08s;}
        .nav-btn:active{transform:scale(.98);}
        .nav-btn:disabled{opacity:.4;cursor:default;}
        .nav-btn.none{border-color:#f0c2c2;color:#d14343;}
        .nav-btn.next{border-color:#c7d2fe;background:#eef0fe;color:var(--primary);}
        .nav-btn.next:hover:not(:disabled){background:#e0e7ff;border-color:#a5b4fc;}
        .nav-btn.next:disabled{box-shadow:none;}

        /* 발주서 버튼 (4열) */
        .ord-box{background:#fff;border:1px solid #e4e7f0;border-radius:18px;padding:14px;margin-top:14px;}
        .ord-box .sec-label{font-size:13px;font-weight:600;color:#7a8199;margin-bottom:9px;}
        .orders{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
        .order{position:relative;overflow:hidden;border:1px solid #e4e7f0;border-radius:11px;cursor:pointer;
            background:#fff;transition:border-color .12s,box-shadow .12s;min-width:0;box-shadow:2px 2px 5px rgba(30,34,51,.06);}
        .order:hover{border-color:#c7d2fe;}
        .order.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,70,229,.25);}
        .o-fill{position:absolute;left:0;right:0;bottom:0;background:rgba(79,70,229,.12);z-index:0;}
        .o-body{position:relative;z-index:1;padding:9px 12px;}
        .o-no{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;}
        .o-center{font-size:11.5px;color:#7a8199;margin-top:2px;}
        .o-qty{font-size:11.5px;color:#5a6178;margin-top:3px;font-variant-numeric:tabular-nums;}
        .o-qty b{color:#16a34a;}

        /* 오른쪽 목록 — 카드형 */
        .side-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
        .side-head .h{font-size:15px;font-weight:600;color:#7a8199;}
        .side-head .c{font-size:13px;color:var(--muted);}
        .listwrap{background:#fff;border:1px solid #e4e7f0;border-radius:18px;padding:8px;
            overflow-y:auto;max-height:calc(100vh - 210px);min-height:300px;}
        .row{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:12px;margin-bottom:4px;cursor:pointer;}
        .row:hover{background:var(--hover);}
        .row.cur{background:#f6f7fc;box-shadow:inset 0 0 0 2px #c7d2fe;}
        .row .idx{width:26px;height:26px;flex:none;border-radius:8px;display:flex;align-items:center;justify-content:center;
            font-size:14px;font-weight:700;background:#f0f1f6;color:var(--muted);}
        .row.cur .idx{background:#eef0fe;color:var(--primary);}
        .row .info{flex:1;min-width:0;}
        /* 상단: 위치배지 · 바코드배지 · 수량 */
        .row .top{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:5px;}
        /* 위치=파란 배경+흰 글씨(좌측 위치카드와 동일 톤) · 바코드/수량=배지 없이 파란 글씨 · 폰트 크기 통일 */
        .loc-badge{font-size:13.5px;font-weight:700;color:#fff;background:var(--primary);
            padding:2px 9px;border-radius:7px;white-space:nowrap;}
        .bc-badge-sm{font-size:13.5px;font-weight:700;color:#4f46e5;font-variant-numeric:tabular-nums;white-space:nowrap;}
        .qty-badge{font-size:13.5px;font-weight:700;color:#F0492F;white-space:nowrap;font-variant-numeric:tabular-nums;}
        .row .nm{font-size:13px;color:#5a6178;line-height:1.45;word-break:break-word;}
        .row .vals{flex:none;text-align:right;display:flex;flex-direction:column;gap:3px;min-width:64px;}
        .row .vals .vv{font-size:12.5px;color:#7a8199;font-variant-numeric:tabular-nums;}
        .row .vals .vv b{font-size:14px;color:var(--ink);}
        .row .vals .vv.empty b{color:#cbd5e1;font-weight:600;}
        .empty-row{padding:40px 12px;text-align:center;color:var(--muted);font-size:14px;}
        .listwrap::-webkit-scrollbar{width:10px;}
        .listwrap::-webkit-scrollbar-thumb{background:#d7dee8;border-radius:8px;border:2px solid #fff;}
        .name-badge{display:inline-block;background:#eef2ff;color:#4f46e5;border:1px solid #e0e7ff;border-radius:6px;
            padding:0 7px;font-weight:700;white-space:nowrap;}

        #toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);background:#1e2233;color:#fff;
            padding:13px 20px;border-radius:10px;font-size:14px;line-height:1.5;box-shadow:0 8px 24px rgba(30,34,51,.25);
            opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:10005;max-width:90vw;white-space:pre-line;text-align:center;}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="page">
        <div class="card">
            <div class="head">
                <h1 class="title">출고준비</h1>
                <span class="meta">발주서 <strong id="ordCount">0</strong>건 선택됨</span>
                <div class="spacer"></div>
                <div class="prog">
                    <span class="lbl">진행</span>
                    <span class="val" id="progVal">0 / 0</span>
                    <span class="track"><span class="fill" id="progFill" style="width:0%"></span></span>
                </div>
            </div>

            <div class="split">
                <!-- 왼쪽: 작업 영역 -->
                <div class="left">
                    <div class="sec-head">
                        <span class="h">지금 찾을 상품</span>
                    </div>

                    <!-- 위치 대형 카드 -->
                    <div class="loc-card">
                        <div class="lbl">위치</div>
                        <div class="big" id="curLoc">-</div>
                    </div>

                    <!-- 상품 카드: 바코드 배지 → 상품명 → 담아야 할 수량 -->
                    <div class="prod-card">
                        <div class="codes"><span class="bc-badge" id="curBc">-</span></div>
                        <div class="name" id="curName">발주서를 선택하세요.</div>
                        <div class="need-row">
                            <span class="k">담아야 할 수량</span>
                            <span class="v" id="curQtyBig">-</span>
                        </div>
                    </div>

                    <!-- 준비 / 재고 -->
                    <div class="inputs">
                        <button class="inputbtn" id="prepBtn" onclick="editVal('prep')">
                            <div class="k">준비</div>
                            <div class="num" id="valPrep">—</div>
                        </button>
                        <button class="inputbtn" id="stockBtn" onclick="editVal('stock')">
                            <div class="k">재고</div>
                            <div class="num" id="valStock">—</div>
                        </button>
                    </div>

                    <!-- 이전 / 없음 / 다음 (준비·재고 바로 아래) -->
                    <div class="nav-row">
                        <button class="nav-btn" id="prevBtn" onclick="movePrev()">← 이전</button>
                        <button class="nav-btn none" id="noneBtn" onclick="markNone()">없음</button>
                        <button class="nav-btn next" id="nextBtn" onclick="moveNext()">다음 →</button>
                    </div>

                    <!-- 발주서 -->
                    <div class="ord-box">
                        <div class="sec-label">발주서</div>
                        <div class="orders" id="ordList"></div>
                    </div>
                </div>

                <!-- 오른쪽: 목록 -->
                <div class="right">
                    <div class="side-head">
                        <span class="h">목록</span>
                        <span class="c"><b id="itemCount">0</b>품목</span>
                    </div>
                    <div class="listwrap" id="itemList">
                        <div class="empty-row">발주서를 선택하세요.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <script src="/numpad.js"></script>
    <script>
        fetch('/header').then(r=>r.text()).then(h=>{document.getElementById('header-container').innerHTML=h;}).catch(()=>{});

        const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        function modelBadge(name){
            const s=String(name==null?'':name); const ci=s.indexOf(',');
            if(ci>0){ const prefix=s.slice(0,ci), rest=s.slice(ci); const m=prefix.match(/(\S+)(\s*)$/);
                if(m){ const t=m[1];
                    if(/^[A-Za-z0-9]+$/.test(t)&&/[A-Za-z]/.test(t)&&/\d/.test(t)){
                        const before=prefix.slice(0, prefix.length-m[0].length);
                        return esc(before)+'<span class="name-badge">'+esc(t)+'</span>'+esc(m[2])+esc(rest); } } }
            return esc(s);
        }

        // URL ?orders=a,b,c → 선택 발주번호
        const selNos=(new URLSearchParams(location.search).get('orders')||'').split(',').map(s=>s.trim()).filter(Boolean);
        let orders=[];         // [{발주번호,물류센터,발주수량,스캔수량,items:[{위치,바코드,상품명,수량,준비,재고}]}]
        let activeNo=null;     // 현재 발주서
        let curIdx=0;          // 현재 품목 인덱스

        async function loadData(){
            try{
                // 발주서 + 출고스캔(rk_ship_box_items) 병렬 — 스캔수량은 출고스캔 기준
                const [res,scRes]=await Promise.all([fetch('/api/orders'), fetch('/api/ship-scan/scanned-map')]);
                if(!res.ok) throw new Error('HTTP '+res.status);
                const data=await res.json();
                const scanMap=scRes.ok?await scRes.json():{};
                const scanByOrder=new Map();
                for(const k in scanMap){ const on=k.split('|')[0]; scanByOrder.set(on,(scanByOrder.get(on)||0)+(Number(scanMap[k])||0)); }
                orders=data.filter(o=>selNos.includes(o.발주번호)).map(o=>{
                    // 원본(박스정보 없음) 우선 dedup — 바코드별 1행
                    const seen=new Set(); const items=[];
                    for(const p of (o.상품정보||[])){
                        if(p.박스정보) continue;
                        if(seen.has(p.상품바코드)) continue;
                        seen.add(p.상품바코드);
                        items.push({위치:p.위치||'-', 바코드:p.상품바코드, 상품명:p.상품이름, 수량:Number(p.확정수량)||0,
                            준비:null, 재고:null});
                    }
                    // 작업 동선에 맞춰 위치 오름차순 정렬 (위치 없는 건 뒤로)
                    items.sort((a,b)=>{
                        const an=(a.위치||'-')==='-', bn=(b.위치||'-')==='-';
                        if(an!==bn) return an?1:-1;
                        return String(a.위치).localeCompare(String(b.위치),'ko',{numeric:true});
                    });
                    return {발주번호:o.발주번호, 물류센터:o.물류센터||'', 발주수량:Number(o.발주수량)||0, 스캔수량:scanByOrder.get(o.발주번호)||0, items};
                });
                document.getElementById('ordCount').textContent=orders.length;
                renderOrders();
                if(orders.length){ selectOrder(orders[0].발주번호); }
            }catch(e){ toast('데이터 로드 실패: '+e.message); }
        }

        function renderOrders(){
            const el=document.getElementById('ordList');
            el.innerHTML=orders.map(o=>{
                const pct=o.발주수량>0?Math.min(100,Math.round(o.스캔수량/o.발주수량*100)):0;
                return `<div class="order ${o.발주번호===activeNo?'active':''}" data-no="${esc(o.발주번호)}" onclick="selectOrder('${esc(o.발주번호)}')">
                    ${pct>0?`<div class="o-fill" style="height:${pct}%"></div>`:''}
                    <div class="o-body">
                        <div class="o-no">${esc(o.발주번호)}</div>
                        <div class="o-center">${esc(o.물류센터)}</div>
                        <div class="o-qty">${o.발주수량} | <b>${o.스캔수량}</b></div>
                    </div></div>`;
            }).join('');
        }

        function activeOrder(){ return orders.find(o=>o.발주번호===activeNo); }

        function selectOrder(no){
            activeNo=no; curIdx=0;
            document.querySelectorAll('#ordList .order').forEach(el=>el.classList.toggle('active',el.dataset.no===no));
            renderCur(); renderItems();
        }

        // ── 현재 찾을 상품 ──
        function renderCur(){
            const o=activeOrder();
            const it=o&&o.items[curIdx];
            const total=o?o.items.length:0;
            document.getElementById('curLoc').textContent=it?(it.위치||'-'):'-';
            document.getElementById('curBc').textContent=it?it.바코드:'-';
            document.getElementById('curQtyBig').textContent=it?it.수량:'-';
            document.getElementById('curName').innerHTML=it?modelBadge(it.상품명):'품목이 없습니다.';
            // 진행률
            document.getElementById('progVal').textContent=`${total?curIdx+1:0} / ${total}`;
            document.getElementById('progFill').style.width=total?`${Math.round((curIdx+1)/total*100)}%`:'0%';
            // 준비 / 재고
            const vp=document.getElementById('valPrep'), vs=document.getElementById('valStock');
            const hasPrep=!!(it&&it.준비!=null), hasStock=!!(it&&it.재고!=null);
            vp.textContent=hasPrep?it.준비:'—';
            vs.textContent=hasStock?it.재고:'—';
            document.getElementById('prepBtn').classList.toggle('filled-prep',hasPrep);
            document.getElementById('stockBtn').classList.toggle('filled-stock',hasStock);
            // 이동 버튼
            document.getElementById('prevBtn').disabled=!o||curIdx<=0;
            document.getElementById('nextBtn').disabled=!o||!total||curIdx>=total-1;
            // 목록 현재행 하이라이트
            document.querySelectorAll('#itemList .row').forEach((el,i)=>el.classList.toggle('cur',i===curIdx));
        }

        function movePrev(){ if(curIdx>0){ curIdx--; renderCur(); } }
        function moveNext(){ const o=activeOrder(); if(o&&curIdx<o.items.length-1){ curIdx++; renderCur(); } }
        // 없음: 현재 상품 재고=0 표시 후 다음으로
        function markNone(){
            const o=activeOrder(); const it=o&&o.items[curIdx];
            if(!it){ toast('품목이 없습니다.'); return; }
            it.재고=0; renderCur(); renderItems();
            moveNext();
        }

        // 준비/재고 입력 (공용 숫자패드 numpad.js)
        function editVal(kind){
            const o=activeOrder(); const it=o&&o.items[curIdx];
            if(!it){ toast('품목이 없습니다.'); return; }
            const cap=kind==='prep'?'준비':'재고';
            const cur=kind==='prep'?it.준비:it.재고;
            // 준비는 수량(확정수량)을 초과할 수 없음. 재고는 상한 없음.
            const opts={ title:`${cap} 수량 · <b>${esc(it.바코드)}</b>`, value:cur==null?0:cur, min:0,
                onConfirm:(n)=>{ if(kind==='prep') it.준비=n; else it.재고=n; renderCur(); renderItems(); } };
            if(kind==='prep') opts.max=Number(it.수량)||0;
            NumPad.open(opts);
        }

        // ── 오른쪽 목록 (카드형) ──
        function renderItems(){
            const o=activeOrder();
            const el=document.getElementById('itemList');
            document.getElementById('itemCount').textContent=o?o.items.length:0;
            if(!o||!o.items.length){
                el.innerHTML=`<div class="empty-row">품목이 없습니다.</div>`;
                return;
            }
            el.innerHTML=o.items.map((it,i)=>{
                const prep=it.준비!=null, stock=it.재고!=null;
                return `<div class="row ${i===curIdx?'cur':''}" onclick="curIdx=${i};renderCur();">
                    <div class="idx">${i+1}</div>
                    <div class="info">
                        <div class="top">
                            <span class="loc-badge">${esc(it.위치||'-')}</span>
                            <span class="bc-badge-sm">${esc(it.바코드)}</span>
                            <span class="qty-badge">${it.수량}개</span>
                        </div>
                        <div class="nm">${modelBadge(it.상품명)}</div>
                    </div>
                    <div class="vals">
                        <span class="vv ${prep?'':'empty'}">준비 <b>${prep?it.준비:'—'}</b></span>
                        <span class="vv ${stock?'':'empty'}">재고 <b>${stock?it.재고:'—'}</b></span>
                    </div>
                </div>`;
            }).join('');
        }

        let toastTimer;
        function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}

        loadData();
    </script>
</body>
</html>
