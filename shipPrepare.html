<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출고준비</title>
    <style>
        /* shipScan.html 스타일 복사 (독립 — 서로 영향 없음) */
        :root{
            --bg:#f3f4f6; --card:#fff; --ink:#0f172a; --ink-soft:#374151; --muted:#94a3b8;
            --line:#eef2f7; --primary:#4f46e5; --primary-dark:#4338ca; --blue:#2563eb; --hover:#f8fafc;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink-soft);font-size:13.5px;-webkit-font-smoothing:antialiased;}
        .page{max-width:1720px;width:96%;margin:22px auto;}
        .card{background:var(--card);border:1px solid #edeff3;border-radius:16px;box-shadow:0 1px 3px rgba(15,23,42,.05),0 10px 30px rgba(15,23,42,.035);padding:20px 22px;}
        .head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
        .title-wrap{display:flex;align-items:baseline;gap:12px;}
        .title{font-size:20px;font-weight:700;color:var(--ink);margin:0;letter-spacing:-.3px;}
        .subtitle{font-size:13px;color:var(--muted);font-weight:500;}
        .subtitle b{color:var(--primary);font-weight:600;}

        .btn{height:40px;padding:0 16px;border:1px solid #e2e8f0;background:#fff;color:#334155;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s;white-space:nowrap;}
        .btn:hover{background:var(--hover);border-color:#cbd5e1;}
        .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 1px 2px rgba(79,70,229,.25);}
        .btn.primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);}
        .btn:disabled{opacity:.5;cursor:default;background:#fff;border-color:#e2e8f0;color:#94a3b8;}

        /* 2분할 4:6 */
        .split{display:flex;gap:16px;align-items:flex-start;}
        .left{flex:4 1 0;min-width:0;}
        .right{flex:6 1 0;min-width:0;}
        @media (max-width:820px){ .split{flex-direction:column;} .left,.right{flex:none;width:100%;} }

        /* ── 왼쪽 상단: 선택된 발주서 버튼들 (요약 배지 스타일) ── */
        .ord-box{background:#fff;border:1px solid #edeff3;border-radius:14px;padding:14px;margin-bottom:14px;}
        .ord-box .sec-label{font-size:13px;font-weight:600;color:#475569;margin-bottom:9px;}
        .orders{display:flex;flex-wrap:wrap;gap:8px;}
        .order{position:relative;overflow:hidden;border:1px solid #e5e9f0;border-radius:9px;cursor:pointer;
            background:#fff;transition:border-color .12s,box-shadow .12s;min-width:132px;
            box-shadow:2px 2px 5px rgba(15,23,42,.07);}
        .order:hover{border-color:#cbd5e1;}
        .order.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(79,70,229,.25),2px 2px 5px rgba(15,23,42,.09);}
        .o-fill{position:absolute;left:0;right:0;bottom:0;background:rgba(37,99,235,.14);z-index:0;}
        .o-body{position:relative;z-index:1;padding:9px 13px;}
        .o-no{font-size:13.5px;font-weight:700;color:#1e293b;white-space:nowrap;}
        .o-center{font-size:11.5px;color:#475569;margin-top:2px;}
        .o-qty{font-size:11.5px;color:#334155;margin-top:3px;font-variant-numeric:tabular-nums;}
        .o-qty b{color:#16a34a;}

        /* ── 왼쪽 하단: 현재 찾는 상품 카드 ── */
        .cur-box{background:#fff;border:1px solid #edeff3;border-radius:14px;padding:16px;}
        .cur-label{font-size:13px;font-weight:600;color:#475569;margin-bottom:9px;}
        .cur-loc-row{display:flex;gap:8px;margin-bottom:10px;}
        .cur-loc{flex:1;min-width:0;height:96px;border:2px solid #93c5fd;border-radius:12px;background:#DBEAFE;
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#2563eb;padding:0 8px;}
        .cur-loc .cl-cap{font-size:12px;font-weight:700;opacity:.75;}
        .cur-loc .cl-val{font-size:34px;font-weight:800;line-height:1.05;word-break:break-all;text-align:center;}
        .cur-bc{flex:1.4;min-width:0;height:96px;border:2px solid #e5e9f0;border-radius:12px;background:#fff;
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--ink);padding:0 8px;}
        .cur-bc .cl-cap{font-size:12px;font-weight:700;color:#94a3b8;}
        .cur-bc .cl-val{font-size:26px;font-weight:800;line-height:1.05;word-break:break-all;text-align:center;font-variant-numeric:tabular-nums;}
        .cur-name{border:1px solid #eef2f7;border-radius:12px;background:#f8fafc;padding:12px 14px;margin-bottom:10px;
            font-size:15px;font-weight:600;color:#334155;line-height:1.5;word-break:break-word;min-height:52px;}
        .cur-name .cn-qty{float:right;font-size:18px;font-weight:800;color:#1e293b;margin-left:10px;font-variant-numeric:tabular-nums;}
        /* 준비 / 재고 입력 */
        .val-row{display:flex;gap:8px;margin-bottom:10px;}
        .val-cell{flex:1;height:88px;border:2px solid #e5e9f0;border-radius:12px;background:#fff;cursor:pointer;
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:border-color .12s,background .12s;}
        .val-cell:hover{border-color:#c7d2fe;background:#f8faff;}
        .val-cell .vc-cap{font-size:13px;font-weight:700;color:#64748b;}
        .val-cell .vc-val{font-size:32px;font-weight:800;color:#1e293b;font-variant-numeric:tabular-nums;}
        .val-cell .vc-val.empty{color:#cbd5e1;}
        /* 이전/다음 */
        .nav-row{display:flex;gap:8px;}
        .nav-btn{flex:1;height:64px;border:1px solid #e2e8f0;background:#fff;border-radius:12px;
            font-size:18px;font-weight:800;color:#334155;cursor:pointer;}
        .nav-btn:hover{background:#f8faff;border-color:#c7d2fe;}
        .nav-btn:disabled{opacity:.4;cursor:default;}
        .nav-btn.next{background:var(--primary);color:#fff;border-color:var(--primary);}
        .nav-btn.next:hover{background:var(--primary-dark);}

        /* 오른쪽 (shipScan과 동일) */
        .right-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;}
        .right-head .cnt{font-size:13px;color:var(--muted);}
        .right-head .cnt b{color:var(--primary);font-weight:700;}
        .table-scroll{overflow:auto;max-height:calc(100vh - 320px);min-height:240px;border:1px solid #edeff3;border-radius:12px;}
        table{width:100%;border-collapse:collapse;min-width:480px;}
        thead th{position:sticky;top:0;z-index:2;background:#f1f3f6;text-align:left;font-size:12px;font-weight:600;color:#8b94a3;padding:10px 12px;border-bottom:1px solid #dfe3ea;white-space:nowrap;}
        thead th.ctr{text-align:center;}
        tbody td{padding:11px 12px;border-bottom:1px solid #eef2f7;color:var(--ink-soft);font-size:13.5px;vertical-align:middle;}
        tbody tr:last-child td{border-bottom:none;}
        tbody tr:hover td{background:var(--hover);}
        tbody tr.row-cur td{background:#eff6ff;}
        .table-scroll thead th,.table-scroll tbody td{border:1px solid #e2e8f0;}
        td.bc{white-space:nowrap;color:#475569;font-variant-numeric:tabular-nums;text-align:center;}
        td.pname{white-space:normal;word-break:break-word;color:#334155;line-height:1.5;}
        .name-badge{display:inline-block;background:#eef2ff;color:#4f46e5;border:1px solid #e0e7ff;border-radius:6px;padding:0 7px;font-weight:700;font-size:12.5px;white-space:nowrap;}
        td.qty{text-align:center;font-variant-numeric:tabular-nums;font-weight:700;font-size:16px;color:#1e293b;}
        td.ctr{text-align:center;}
        .state-row td{text-align:center;padding:36px 12px;color:var(--muted);}
        .table-scroll::-webkit-scrollbar{width:10px;height:10px;}
        .table-scroll::-webkit-scrollbar-thumb{background:#d7dee8;border-radius:8px;border:2px solid #fff;}

        #toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:13px 20px;border-radius:10px;font-size:13.5px;line-height:1.5;box-shadow:0 8px 24px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:10005;max-width:90vw;white-space:pre-line;text-align:center;}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="page">
        <div class="card">
            <div class="head">
                <div class="title-wrap">
                    <h1 class="title">출고준비</h1>
                    <span class="subtitle">발주서 <b id="ordCount">0</b>건 선택됨</span>
                </div>
            </div>

            <div class="split">
                <!-- 왼쪽 -->
                <div class="left">
                    <!-- 상단: 선택된 발주서 버튼들 -->
                    <div class="ord-box">
                        <div class="sec-label">발주서</div>
                        <div class="orders" id="ordList"></div>
                    </div>

                    <!-- 하단: 지금 찾아야 하는 상품 -->
                    <div class="cur-box">
                        <div class="cur-label">지금 찾을 상품</div>
                        <div class="cur-loc-row">
                            <div class="cur-loc">
                                <span class="cl-cap">위치</span>
                                <span class="cl-val" id="curLoc">-</span>
                            </div>
                            <div class="cur-bc">
                                <span class="cl-cap">바코드</span>
                                <span class="cl-val" id="curBc">-</span>
                            </div>
                        </div>
                        <div class="cur-name" id="curName"><span class="cn-qty" id="curQty"></span>발주서를 선택하세요.</div>
                        <div class="val-row">
                            <div class="val-cell" onclick="editVal('prep')">
                                <span class="vc-cap">준비</span>
                                <span class="vc-val empty" id="valPrep">-</span>
                            </div>
                            <div class="val-cell" onclick="editVal('stock')">
                                <span class="vc-cap">재고</span>
                                <span class="vc-val empty" id="valStock">-</span>
                            </div>
                        </div>
                        <div class="nav-row">
                            <button class="nav-btn" id="prevBtn" onclick="movePrev()">← 이전</button>
                            <button class="nav-btn next" id="nextBtn" onclick="moveNext()">다음 →</button>
                        </div>
                    </div>
                </div>

                <!-- 오른쪽: 목록 -->
                <div class="right">
                    <div class="right-head">
                        <div class="cnt">목록 · <b id="itemCount">0</b>품목</div>
                    </div>
                    <div class="table-scroll">
                        <table>
                            <colgroup><col style="width:80px"><col style="width:150px"><col><col style="width:84px"><col style="width:70px"><col style="width:70px"></colgroup>
                            <thead><tr><th class="ctr">위치</th><th class="ctr">바코드</th><th>상품명</th><th class="ctr">수량</th><th class="ctr">준비</th><th class="ctr">재고</th></tr></thead>
                            <tbody id="itemBody"><tr class="state-row"><td colspan="6">발주서를 선택하세요.</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>
    <script src="/numpad.js"></script>
    <script>
        fetch('/header').then(r=>r.text()).then(h=>{document.getElementById('header-container').innerHTML=h;}).catch(()=>{});

        const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        function modelBadge(name){
            const s=String(name==null?'':name); const ci=s.indexOf(',');
            if(ci>0){ const prefix=s.slice(0,ci), rest=s.slice(ci); const m=prefix.match(/(\S+)(\s*)$/);
                if(m){ const t=m[1];
                    if(/^[A-Za-z0-9]+$/.test(t)&&/[A-Za-z]/.test(t)&&/\d/.test(t)){
                        const before=prefix.slice(0, prefix.length-m[0].length);
                        return esc(before)+'<span class="name-badge">'+esc(t)+'</span>'+esc(m[2])+esc(rest); } } }
            return esc(s);
        }

        // URL ?orders=a,b,c → 선택 발주번호
        const selNos=(new URLSearchParams(location.search).get('orders')||'').split(',').map(s=>s.trim()).filter(Boolean);
        let orders=[];         // [{발주번호,물류센터,발주수량,스캔수량,items:[{위치,바코드,상품명,수량,준비,재고}]}]
        let activeNo=null;     // 현재 발주서
        let curIdx=0;          // 현재 품목 인덱스

        async function loadData(){
            try{
                const res=await fetch('/api/orders');
                if(!res.ok) throw new Error('HTTP '+res.status);
                const data=await res.json();
                orders=data.filter(o=>selNos.includes(o.발주번호)).map(o=>{
                    // 원본(박스정보 없음) 우선 dedup — 바코드별 1행
                    const seen=new Set(); const items=[];
                    for(const p of (o.상품정보||[])){
                        if(p.박스정보) continue;
                        if(seen.has(p.상품바코드)) continue;
                        seen.add(p.상품바코드);
                        items.push({위치:p.위치||'-', 바코드:p.상품바코드, 상품명:p.상품이름, 수량:Number(p.확정수량)||0,
                            준비:null, 재고:null});
                    }
                    return {발주번호:o.발주번호, 물류센터:o.물류센터||'', 발주수량:Number(o.발주수량)||0, 스캔수량:Number(o.스캔수량)||0, items};
                });
                document.getElementById('ordCount').textContent=orders.length;
                renderOrders();
                if(orders.length){ selectOrder(orders[0].발주번호); }
            }catch(e){ toast('데이터 로드 실패: '+e.message); }
        }

        function renderOrders(){
            const el=document.getElementById('ordList');
            el.innerHTML=orders.map(o=>{
                const pct=o.발주수량>0?Math.min(100,Math.round(o.스캔수량/o.발주수량*100)):0;
                return `<div class="order ${o.발주번호===activeNo?'active':''}" data-no="${esc(o.발주번호)}" onclick="selectOrder('${esc(o.발주번호)}')">
                    ${pct>0?`<div class="o-fill" style="height:${pct}%"></div>`:''}
                    <div class="o-body">
                        <div class="o-no">${esc(o.발주번호)}</div>
                        <div class="o-center">${esc(o.물류센터)}</div>
                        <div class="o-qty">${o.발주수량} | <b>${o.스캔수량}</b></div>
                    </div></div>`;
            }).join('');
        }

        function activeOrder(){ return orders.find(o=>o.발주번호===activeNo); }

        function selectOrder(no){
            activeNo=no; curIdx=0;
            document.querySelectorAll('#ordList .order').forEach(el=>el.classList.toggle('active',el.dataset.no===no));
            renderCur(); renderItems();
        }

        // ── 현재 찾을 상품 카드 ──
        function renderCur(){
            const o=activeOrder();
            const it=o&&o.items[curIdx];
            document.getElementById('curLoc').textContent=it?(it.위치||'-'):'-';
            document.getElementById('curBc').textContent=it?it.바코드:'-';
            document.getElementById('curName').innerHTML=it
                ? `<span class="cn-qty" id="curQty">${it.수량}</span>`+modelBadge(it.상품명)
                : `<span class="cn-qty" id="curQty"></span>품목이 없습니다.`;
            const vp=document.getElementById('valPrep'), vs=document.getElementById('valStock');
            vp.textContent=it&&it.준비!=null?it.준비:'-';
            vp.classList.toggle('empty',!(it&&it.준비!=null));
            vs.textContent=it&&it.재고!=null?it.재고:'-';
            vs.classList.toggle('empty',!(it&&it.재고!=null));
            document.getElementById('prevBtn').disabled=!o||curIdx<=0;
            document.getElementById('nextBtn').disabled=!o||!o.items.length||curIdx>=o.items.length-1;
            // 목록 현재행 하이라이트 동기화
            document.querySelectorAll('#itemBody tr').forEach((tr,i)=>tr.classList.toggle('row-cur',i===curIdx));
        }

        function movePrev(){ if(curIdx>0){ curIdx--; renderCur(); } }
        function moveNext(){ const o=activeOrder(); if(o&&curIdx<o.items.length-1){ curIdx++; renderCur(); } }

        // 준비/재고 입력 (공용 숫자패드)
        function editVal(kind){
            const o=activeOrder(); const it=o&&o.items[curIdx];
            if(!it){ toast('품목이 없습니다.'); return; }
            const cap=kind==='prep'?'준비':'재고';
            const cur=kind==='prep'?it.준비:it.재고;
            NumPad.open({ title:`${cap} 수량 · <b>${esc(it.바코드)}</b>`, value:cur==null?0:cur, min:0,
                onConfirm:(n)=>{ if(kind==='prep') it.준비=n; else it.재고=n; renderCur(); renderItems(); } });
        }

        // ── 오른쪽 목록 ──
        function renderItems(){
            const o=activeOrder();
            const tb=document.getElementById('itemBody');
            document.getElementById('itemCount').textContent=o?o.items.length:0;
            if(!o||!o.items.length){
                tb.innerHTML=`<tr class="state-row"><td colspan="6">품목이 없습니다.</td></tr>`;
                return;
            }
            tb.innerHTML=o.items.map((it,i)=>`<tr class="${i===curIdx?'row-cur':''}" onclick="curIdx=${i};renderCur();">
                <td class="ctr">${esc(it.위치||'-')}</td>
                <td class="bc">${esc(it.바코드)}</td>
                <td class="pname">${modelBadge(it.상품명)}</td>
                <td class="qty">${it.수량}</td>
                <td class="ctr">${it.준비!=null?it.준비:'<span style="color:#cbd5e1">-</span>'}</td>
                <td class="ctr">${it.재고!=null?it.재고:'<span style="color:#cbd5e1">-</span>'}</td>
            </tr>`).join('');
        }

        let toastTimer;
        function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}

        loadData();
    </script>
</body>
</html>
