<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠팡 로켓 중국입고</title>
    <style>
        :root{
            --bg:#f3f4f6; --card:#fff; --ink:#0f172a; --ink-soft:#374151; --muted:#94a3b8;
            --line:#eef2f7; --primary:#4f46e5; --primary-dark:#4338ca; --blue:#2563eb; --hover:#f8fafc;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink-soft);font-size:13.5px;-webkit-font-smoothing:antialiased;}
        .page{max-width:1720px;width:96%;margin:22px auto;}
        .card{background:var(--card);border:1px solid #edeff3;border-radius:16px;box-shadow:0 1px 3px rgba(15,23,42,.05),0 10px 30px rgba(15,23,42,.035);padding:22px 24px 18px;}
        .head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
        .title-wrap{display:flex;align-items:baseline;gap:10px;}
        .title{font-size:20px;font-weight:700;color:var(--ink);margin:0;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;}
        .title .flag{font-size:1.1em;}
        .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
        .sep{width:1px;height:22px;background:#e2e8f0;margin:0 2px;}

        /* 버튼 (발주서 스타일) */
        .action-button{height:38px;padding:0 15px;border:1px solid #e2e8f0;background:#fff;color:#334155;border-radius:9px;font-size:13.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s;white-space:nowrap;}
        .action-button:hover{background:var(--hover);border-color:#cbd5e1;}
        .action-button:active{background:#f1f5f9;}
        .delete-button:hover{color:#dc2626;border-color:#fecaca;background:#fef2f2;}

        /* 업로드 영역 */
        .upload-area{border:2px dashed #d7dee8;border-radius:12px;padding:26px 20px;text-align:center;background:#fafbfc;transition:border-color .15s,background .15s;margin-bottom:16px;}
        .upload-area.dragover{border-color:var(--primary);background:#eef2ff;}
        .upload-area .up-icon{width:30px;height:30px;color:var(--primary);margin-bottom:8px;}
        .upload-area p{margin:10px 0 0;color:var(--muted);font-size:12.5px;}
        .upload-btn{height:38px;padding:0 18px;background:var(--primary);color:#fff;border:1px solid var(--primary);border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600;box-shadow:0 1px 2px rgba(79,70,229,.25);transition:background .12s;}
        .upload-btn:hover{background:var(--primary-dark);}

        /* 툴바 (필터/정렬) */
        .toolbar{display:flex;justify-content:flex-end;align-items:center;gap:18px;margin-bottom:10px;flex-wrap:wrap;}
        .tb-field{display:flex;align-items:center;gap:8px;}
        .tb-field label{font-weight:600;color:var(--ink-soft);font-size:12.5px;}
        .tb-field select{height:34px;padding:0 10px;border:1px solid #e2e8f0;border-radius:9px;background:#fff;font-size:13px;color:#334155;cursor:pointer;outline:none;}
        .tb-field select:focus{border-color:#c7d2fe;box-shadow:0 0 0 3px rgba(99,102,241,.1);}

        /* 테이블 */
        .table-container{overflow-x:auto;}
        .table{width:100%;border-collapse:collapse;margin:0;}
        .table thead th{position:sticky;top:0;z-index:2;background:#f1f3f6;text-align:center;font-size:12px;font-weight:600;color:#8b94a3;padding:9px 8px;border:1px solid #dfe3ea;white-space:nowrap;}
        .table tbody td{padding:8px 8px;border:1px solid #e8ebf1;color:var(--ink-soft);font-size:12px;text-align:center;white-space:nowrap;vertical-align:middle;}
        .table tbody tr:hover td{background:var(--hover);}
        .table td[contenteditable="true"]{cursor:text;}
        .table td[contenteditable="true"]:focus{outline:2px solid var(--primary);outline-offset:-2px;background:#fff;}
        .table th:nth-child(2), .table td:nth-child(2){display:none;} /* 팔렛 숨김 */
        .group-header, .subgroup-header, .item-row, .collapsed, .toggle-icon{display:none;}
        .table-container::-webkit-scrollbar{width:10px;height:10px;}
        .table-container::-webkit-scrollbar-thumb{background:#d7dee8;border-radius:8px;border:2px solid #fff;}
        .table-container::-webkit-scrollbar-thumb:hover{background:#c2ccd9;}

        /* 모달 */
        .modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;}
        .modal-content{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:22px;width:420px;max-width:92vw;border-radius:14px;box-shadow:0 20px 50px rgba(15,23,42,.3);}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #eef2f7;}
        .modal-header h2{margin:0;font-size:16px;color:var(--ink);}
        .close{font-size:22px;cursor:pointer;color:var(--muted);line-height:1;}
        .close:hover{color:var(--ink);}
        .modal-body{margin-bottom:16px;}
        .modal-body p{color:var(--muted);font-size:13px;margin:0 0 12px;text-align:center;}
        .modal-body label{font-size:12.5px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:6px;}
        .modal-body input{width:100%;height:42px;padding:0 12px;margin-top:0;border:1px solid #e2e8f0;border-radius:9px;font-size:14px;outline:none;}
        .modal-body input:focus{border-color:#c7d2fe;box-shadow:0 0 0 3px rgba(99,102,241,.1);}
        .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
        .modal-btn{height:38px;padding:0 16px;border:1px solid #e2e8f0;background:#fff;color:#334155;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:500;}
        .modal-btn.confirm{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;}
        .modal-btn.confirm:hover{background:var(--primary-dark);}
        .modal-btn.cancel:hover{background:var(--hover);border-color:#cbd5e1;}
        .modal h2{font-size:16px;color:var(--ink);margin:0 0 14px;}

        .button-container{margin-top:16px;text-align:right;}
        .shipment-code-button{display:block;width:100%;padding:9px 12px;margin:6px 0;background:#fff;border:1px solid #e2e8f0;border-radius:9px;cursor:pointer;text-align:center;font-size:13px;color:#334155;transition:background .12s,border-color .12s;}
        .shipment-code-button:hover{background:var(--hover);border-color:#cbd5e1;}
        .shipment-code-button.selected{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;}
        .modal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;padding:6px;max-height:300px;overflow-y:auto;margin:0 auto;width:100%;}

        @media print {
            body * { visibility: hidden; }
            .card, .card * { visibility: visible; }
            .card { position: absolute; left: 0; top: 0; width: 100%; padding: 0; margin: 0; border: none; box-shadow: none; }
            .table { width: 100%; border-collapse: collapse; page-break-inside: auto; font-size: 9px !important; }
            .table tr { page-break-inside: avoid; page-break-after: auto; }
            .table th, .table td { border: 1px solid #000; padding: 4px; font-size: 9px !important; line-height: 1.2; white-space: nowrap; }
            .table th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-weight: bold; position: static; }
            .table td:nth-child(5) { white-space: normal; max-width: 200px; word-break: break-word; }
            .table-container { max-height: none !important; overflow: visible !important; }
            .head, .actions, .upload-area, .toolbar { display: none !important; }
            @page { size: A4 landscape; margin: 0.5cm; }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <div class="page">
        <div class="card">
            <div class="head">
                <div class="title-wrap">
                    <h1 class="title">중국입고 관리 <span class="flag">🐉</span></h1>
                </div>
                <div class="actions">
                    <button class="action-button delete-button" id="deleteButton">삭제</button>
                    <span class="sep"></span>
                    <button class="action-button organize-button" id="organizeButton">CN 입고 정리</button>
                    <button class="action-button import1-button" id="import1Button">입고1</button>
                    <button class="action-button import2-button" id="import2Button">입고2</button>
                    <button class="action-button order-organize-button" id="orderOrganizeButton">입고1/2 초기화</button>
                    <button class="action-button pdf-button" id="printButton">인쇄</button>
                </div>
            </div>

            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept=".xlsx" style="display: none;">
                <svg class="up-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
                <div><button class="upload-btn" onclick="document.getElementById('fileInput').click()">Excel 파일 업로드 🐲</button></div>
                <p>또는 파일을 여기에 끌어다 놓으세요</p>
            </div>

            <div class="toolbar">
                <div class="tb-field">
                    <label for="filterDropdown">필터</label>
                    <select id="filterDropdown">
                        <option value="all">전체 표시</option>
                        <option value="shipping">출고만 표시</option>
                    </select>
                </div>
                <div class="tb-field">
                    <label for="sortDropdown">정렬 기준</label>
                    <select id="sortDropdown">
                        <option value="none">- 선택 -</option>
                        <option value="logisticsCenter">물류센터</option>
                        <option value="boxName">박스번호</option>
                        <option value="orderNumber">중국번호</option>
                        <option value="productName">상품명</option>
                        <option value="availableOrders">출고예정</option>
                        <option value="shippingDate">출고예정일</option>
                    </select>
                </div>
            </div>

            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>출고코드</th>
                            <th style="display: none;">팔렛</th>
                            <th>박스명</th>
                            <th>중국번호</th>
                            <th>상품명</th>
                            <th>수량</th>
                            <th>바코드</th>
                            <th>출고번호</th>
                            <th>센터</th>
                            <th>출고개수</th>
                            <th>출고예정일</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody">
                        <!-- 데이터가 여기에 동적으로 추가됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 출고날짜 입력 모달 -->
    <div id="dateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>출고코드 입력</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <label for="shipmentCode">출고코드:</label>
                <input type="text" id="shipmentCode" placeholder="출고코드를 입력하세요">
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeModal()">취소</button>
                <button class="modal-btn confirm" onclick="confirmShipmentCode()">확인</button>
            </div>
        </div>
    </div>

    <!-- 삭제 모달 -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>삭제할 출고코드 선택</h2>
            <div id="shipmentCodeList">
                <!-- 출고코드 버튼들이 여기에 동적으로 추가됩니다 -->
            </div>
            <div class="button-container">
                <button class="action-button delete-button" id="confirmDeleteButton">삭제</button>
            </div>
        </div>
    </div>

    <!-- 입고1 모달 -->
    <div id="import1Modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>입고1 정리</h2>
                <span class="close" onclick="closeImport1Modal()">&times;</span>
            </div>
            <div class="modal-body">
                <p>출고코드를 선택하세요</p>
                <div class="modal-grid" id="import1ShipmentCodeList">
                    <!-- 출고코드 버튼들이 여기에 동적으로 추가됩니다 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 입고2 모달 -->
    <div id="import2Modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>입고2 정리</h2>
                <span class="close" onclick="closeImport2Modal()">&times;</span>
            </div>
            <div class="modal-body">
                <p>출고코드를 선택하세요</p>
                <div class="modal-grid" id="import2ShipmentCodeList">
                    <!-- 출고코드 버튼들이 여기에 동적으로 추가됩니다 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        // 헤더 로드
        fetch('/header')
            .then(response => response.text())
            .then(html => {
                document.getElementById('header-container').innerHTML = html;
            });

        // 모달 관련 함수
        function showModal() {
            document.getElementById('dateModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('dateModal').style.display = 'none';
            selectedFile = null;
            document.getElementById('shipmentCode').value = '';
        }

        function confirmShipmentCode() {
            const shipmentCode = document.getElementById('shipmentCode').value.trim();
            if (!shipmentCode) {
                alert('출고코드를 입력해주세요.');
                return;
            }
            if (selectedFile) {
                handleFileUpload(selectedFile, shipmentCode);
            }
            closeModal();
        }

        // 드래그 앤 드롭 이벤트 처리
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                selectedFile = files[0];
                showModal();
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                showModal();
            }
        });

        async function handleFileUpload(file, shipmentCode) {
            if (!file.name.endsWith('.xlsx')) {
                alert('Excel 파일만 업로드 가능합니다.');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('shipmentCode', shipmentCode);

            try {
                const response = await fetch('/api/importChina/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('파일 업로드 실패');
                }

                const data = await response.json();
                alert(data.message);
                loadImportData();
            } catch (error) {
                console.error('Error:', error);
                alert('파일 업로드 중 오류가 발생했습니다.');
            }
        }

        // 전역 변수로 데이터 저장
        let globalData = [];

        // 데이터 로드 함수
        async function loadImportData() {
            try {
                const response = await fetch('/api/importChina');
                if (!response.ok) {
                    throw new Error('데이터 로드 실패');
                }
                const data = await response.json();
                console.log('로드된 데이터:', data);
                globalData = data; // 전역 변수에 데이터 저장
                displayData(data);
            } catch (error) {
                console.error('Error loading data:', error);
                console.error('Error:', error);
            }
        }

        function displayData(data) {
            const tbody = document.getElementById('dataBody');
            tbody.innerHTML = '';
            
            // 현재 필터 상태 확인
            const filterDropdown = document.getElementById('filterDropdown');
            const filterValue = filterDropdown.value;
            
            // 필터링된 데이터
            let filteredData = data;
            if (filterValue === 'shipping') {
                filteredData = data.filter(item => item.shippingDate && item.shippingDate.trim() !== '');
            }
            
            filteredData.forEach(item => {
                const row = document.createElement('tr');
                
                // 출고코드
                const shipmentCodeCell = document.createElement('td');
                shipmentCodeCell.textContent = item.shipmentCode;
                row.appendChild(shipmentCodeCell);
                
                // 팔렛 (숨김)
                const palletCell = document.createElement('td');
                palletCell.style.display = 'none';
                palletCell.textContent = item.pallet;
                row.appendChild(palletCell);
                
                // 박스명
                const boxNameCell = document.createElement('td');
                boxNameCell.textContent = item.boxName;
                row.appendChild(boxNameCell);
                
                // 중국번호
                const orderNumberCell = document.createElement('td');
                orderNumberCell.textContent = item.orderNumber;
                row.appendChild(orderNumberCell);
                
                // 상품명
                const productNameCell = document.createElement('td');
                productNameCell.textContent = item.productName;
                row.appendChild(productNameCell);
                
                // 수량
                const quantityCell = document.createElement('td');
                quantityCell.textContent = item.quantity;
                row.appendChild(quantityCell);
                
                // 바코드
                const barcodeCell = document.createElement('td');
                barcodeCell.textContent = item.barcode;
                row.appendChild(barcodeCell);
                
                // 새로운 열: 출고번호
                const shippingNumberCell = document.createElement('td');
                shippingNumberCell.contentEditable = true;
                // 출고예정 정보에서 첫 번째 값(출고번호) 추출
                let shippingNumber = '';
                if (item.availableOrders) {
                    const parts = item.availableOrders.split('-');
                    if (parts.length > 0) {
                        shippingNumber = parts[0];
                    }
                }
                shippingNumberCell.textContent = shippingNumber;
                shippingNumberCell.addEventListener('blur', async function() {
                    updateOrderData(this, item, 0);
                });
                row.appendChild(shippingNumberCell);
                
                // 새로운 열: 센터
                const centerCell = document.createElement('td');
                centerCell.contentEditable = true;
                // 출고예정 정보에서 두 번째 값(센터) 추출
                let center = '';
                if (item.availableOrders) {
                    const parts = item.availableOrders.split('-');
                    if (parts.length > 1) {
                        center = parts[1];
                    }
                }
                centerCell.textContent = center;
                centerCell.addEventListener('blur', async function() {
                    updateOrderData(this, item, 1);
                });
                row.appendChild(centerCell);
                
                // 새로운 열: 출고개수
                const shippingQuantityCell = document.createElement('td');
                shippingQuantityCell.contentEditable = true;
                // 출고예정 정보에서 세 번째 값(출고개수) 추출
                let shippingQuantity = '';
                if (item.availableOrders) {
                    const parts = item.availableOrders.split('-');
                    if (parts.length > 2) {
                        shippingQuantity = parts[2];
                    }
                }
                shippingQuantityCell.textContent = shippingQuantity;
                shippingQuantityCell.addEventListener('blur', async function() {
                    updateOrderData(this, item, 2);
                });
                row.appendChild(shippingQuantityCell);
                
                // 출고예정일
                const shippingDateCell = document.createElement('td');
                shippingDateCell.textContent = item.shippingDate || '';
                row.appendChild(shippingDateCell);
                
                tbody.appendChild(row);
            });
        }

        // 주문 정보 업데이트 함수 추가
        async function updateOrderData(cell, item, index) {
            // 현재 availableOrders를 파싱
            const parts = item.availableOrders ? item.availableOrders.split('-') : ['', '', ''];
            const newValue = cell.textContent.trim();
            
            // 업데이트된 값을 parts 배열에 저장
            parts[index] = newValue;
            
            // 새 availableOrders 문자열 생성
            const newAvailableOrders = parts.join('-');
            
            // 변경사항이 있는 경우에만 업데이트
            if (newAvailableOrders !== item.availableOrders) {
                try {
                    const response = await fetch('/api/importChina/updateAvailableOrders', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            shipmentCode: item.shipmentCode,
                            barcode: item.barcode,
                            availableOrders: newAvailableOrders
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error('업데이트 실패');
                    }
                    
                    item.availableOrders = newAvailableOrders;
                } catch (error) {
                    console.error('Error updating order data:', error);
                    // 업데이트 실패 시 셀 값을 원래대로 복원
                    if (index === 0) {
                        cell.textContent = parts[0] || '';
                    } else if (index === 1) {
                        cell.textContent = parts[1] || '';
                    } else if (index === 2) {
                        cell.textContent = parts[2] || '';
                    }
                    alert('업데이트 중 오류가 발생했습니다.');
                }
            }
        }

        // 정렬 함수 추가
        function sortData(field) {
            if (field === 'none') {
                displayData(globalData);
                return;
            }

            const sortedData = [...globalData].sort((a, b) => {
                // '물류센터' 기준 선택 시 다중 정렬 적용
                if (field === 'logisticsCenter') {
                    // 1. 출고코드 기준 정렬
                    const shipmentCodeA = (a.shipmentCode || '').toString();
                    const shipmentCodeB = (b.shipmentCode || '').toString();
                    
                    if (shipmentCodeA !== shipmentCodeB) {
                        return shipmentCodeA.localeCompare(shipmentCodeB);
                    }
                    
                    // 2. 출고예정일 기준 정렬
                    const dateA = (a.shippingDate || '').toString();
                    const dateB = (b.shippingDate || '').toString();
                    
                    if (dateA !== dateB) {
                        return dateA.localeCompare(dateB);
                    }
                    
                    // 3. 센터(물류센터) 기준 정렬 - availableOrders에서 센터 추출
                    const getCenterFromAvailableOrders = (availableOrders) => {
                        if (!availableOrders) return '';
                        const match = availableOrders.match(/^\d+-(.*)-\d+$/);
                        return match ? match[1] : '';
                    };
                    
                    const centerA = getCenterFromAvailableOrders(a.availableOrders);
                    const centerB = getCenterFromAvailableOrders(b.availableOrders);
                    
                    if (centerA !== centerB) {
                        return centerA.localeCompare(centerB);
                    }
                    
                    // 4. 발주번호 기준 정렬 - availableOrders에서 발주번호 추출
                    const getOrderNumberFromAvailableOrders = (availableOrders) => {
                        if (!availableOrders) return '';
                        const match = availableOrders.match(/^(\d+)-.*-\d+$/);
                        return match ? match[1] : '';
                    };
                    
                    const orderNumA = getOrderNumberFromAvailableOrders(a.availableOrders);
                    const orderNumB = getOrderNumberFromAvailableOrders(b.availableOrders);
                    
                    if (orderNumA !== orderNumB) {
                        return orderNumA.localeCompare(orderNumB);
                    }
                    
                    // 5. 상품명 기준 정렬
                    const productNameA = (a.productName || '').toString().toLowerCase();
                    const productNameB = (b.productName || '').toString().toLowerCase();
                    
                    return productNameA.localeCompare(productNameB);
                }
                // '출고예정' 기준 선택 시 이중 정렬 적용 (출고예정일 > 출고예정)
                else if (field === 'availableOrders') {
                    // 1. 출고예정일 기준 정렬
                    const dateA = (a.shippingDate || '').toString();
                    const dateB = (b.shippingDate || '').toString();
                    
                    if (dateA !== dateB) {
                        return dateA.localeCompare(dateB);
                    }
                    
                    // 2. 출고예정 기준 정렬
                    const valueA = (a.availableOrders || '').toString().toLowerCase();
                    const valueB = (b.availableOrders || '').toString().toLowerCase();
                    
                    // 출고예정 값이 같은 경우 박스명으로 정렬
                    if (valueA === valueB) {
                        const boxA = (a.boxName || '').toString().toLowerCase();
                        const boxB = (b.boxName || '').toString().toLowerCase();
                        return boxA.localeCompare(boxB);
                    }
                    
                    return valueA.localeCompare(valueB);
                } else {
                    // 다른 필드는 단일 기준 정렬
                    const valueA = (a[field] || '').toString().toLowerCase();
                    const valueB = (b[field] || '').toString().toLowerCase();
                    return valueA.localeCompare(valueB);
                }
            });
            
            displayData(sortedData);
        }

        // 정렬 드롭다운 이벤트 리스너 추가
        document.addEventListener('DOMContentLoaded', () => {
            loadImportData();
            
            // 정렬 드롭다운 이벤트 설정
            const sortDropdown = document.getElementById('sortDropdown');
            sortDropdown.addEventListener('change', (e) => {
                sortData(e.target.value);
            });
            
            // 필터 드롭다운 이벤트 설정
            const filterDropdown = document.getElementById('filterDropdown');
            filterDropdown.addEventListener('change', () => {
                sortData(sortDropdown.value);
            });
        });

        // 삭제 모달 관련 스크립트
        const deleteButton = document.getElementById('deleteButton');
        const deleteModal = document.getElementById('deleteModal');
        const closeButton = deleteModal.querySelector('.close');
        const shipmentCodeList = document.getElementById('shipmentCodeList');
        const confirmDeleteButton = document.getElementById('confirmDeleteButton');
        let selectedShipmentCode = null;
        
        // 삭제 버튼 클릭 시 모달 열기
        deleteButton.addEventListener('click', async () => {
            try {
                const response = await fetch('/api/importChina/data');
                const data = await response.json();
                
                // 출고코드 목록 가져오기
                const shipmentCodes = [...new Set(data.map(item => item.shipmentCode))];
                
                // 출고코드 버튼 생성
                shipmentCodeList.innerHTML = '';
                shipmentCodes.forEach(code => {
                    const button = document.createElement('button');
                    button.className = 'shipment-code-button';
                    button.textContent = code;
                    button.addEventListener('click', () => {
                        // 선택된 버튼 스타일 변경
                        document.querySelectorAll('.shipment-code-button').forEach(btn => {
                            btn.classList.remove('selected');
                        });
                        button.classList.add('selected');
                        selectedShipmentCode = code;
                    });
                    shipmentCodeList.appendChild(button);
                });
                
                deleteModal.style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
            }
        });
        
        // 모달 닫기
        closeButton.addEventListener('click', () => {
            deleteModal.style.display = 'none';
            selectedShipmentCode = null;
        });
        
        // 모달 외부 클릭 시 닫기
        window.addEventListener('click', (event) => {
            if (event.target === deleteModal) {
                deleteModal.style.display = 'none';
                selectedShipmentCode = null;
            }
        });
        
        // 삭제 확인 버튼 클릭 시
        confirmDeleteButton.addEventListener('click', async () => {
            if (!selectedShipmentCode) {
                alert('삭제할 출고코드를 선택해주세요.');
                return;
            }
            
            try {
                const response = await fetch(`/api/importChina/delete/${encodeURIComponent(selectedShipmentCode)}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert('삭제가 완료되었습니다.');
                    deleteModal.style.display = 'none';
                    selectedShipmentCode = null;
                    // 테이블 새로고침
                    loadImportData();
                } else {
                    alert('삭제 중 오류가 발생했습니다.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('삭제 중 오류가 발생했습니다.');
            }
        });

        // 인쇄 버튼 클릭 이벤트
        document.getElementById('printButton').addEventListener('click', () => {
            // 출고예정일이 없는 행을 임시로 숨김
            const rows = document.querySelectorAll('#dataBody tr');
            const hiddenRows = [];
            
            rows.forEach(row => {
                const shippingDateCell = row.cells[10]; // 출고예정일은 11번째 열 (인덱스 10)
                if (!shippingDateCell || !shippingDateCell.textContent.trim()) {
                    row.dataset.originalDisplay = row.style.display;
                    row.style.display = 'none';
                    hiddenRows.push(row);
                }
            });
            
            // 인쇄 다이얼로그 표시
            window.print();
            
            // 인쇄 후 숨긴 행 복원 (setTimeout을 사용하여 인쇄 대화상자가 닫힌 후 실행)
            setTimeout(() => {
                hiddenRows.forEach(row => {
                    row.style.display = row.dataset.originalDisplay || '';
                });
            }, 1000);
        });

        // 발주서 정리 버튼 클릭 이벤트
        document.getElementById('organizeButton').addEventListener('click', async () => {
            try {
                // 발주서 정리 API 호출
                const response = await fetch('/api/importChina/organize', {
                    method: 'POST'
                });
                
                if (!response.ok) {
                    throw new Error('발주서 정리 중 오류가 발생했습니다.');
                }
                
                alert('발주서 정리가 완료되었습니다.');
                loadImportData(); // 테이블 새로고침
            } catch (error) {
                console.error('Error:', error);
                alert(error.message);
            }
        });

        // 입고1, 입고2 모달 관련 함수
        function showImport1Modal() {
            document.getElementById('import1Modal').style.display = 'block';
            loadShipmentCodes('import1');
        }

        function showImport2Modal() {
            document.getElementById('import2Modal').style.display = 'block';
            loadShipmentCodes('import2');
        }

        function closeImport1Modal() {
            document.getElementById('import1Modal').style.display = 'none';
        }

        function closeImport2Modal() {
            document.getElementById('import2Modal').style.display = 'none';
        }

        async function loadShipmentCodes(type) {
            try {
                const response = await fetch('/api/importChina/data');
                const data = await response.json();
                
                // 출고코드 목록 가져오기 (중복 제거)
                const shipmentCodes = [...new Set(data.map(item => item.shipmentCode))];
                
                // 출고코드 버튼 생성
                const container = document.getElementById(`${type}ShipmentCodeList`);
                container.innerHTML = '';
                
                shipmentCodes.forEach(code => {
                    const button = document.createElement('button');
                    button.className = 'shipment-code-button';
                    button.textContent = code;
                    button.addEventListener('click', () => {
                        // 선택된 버튼 스타일 변경
                        document.querySelectorAll(`#${type}ShipmentCodeList .shipment-code-button`).forEach(btn => {
                            btn.classList.remove('selected');
                        });
                        button.classList.add('selected');
                        handleShipmentCodeSelection(code, type);
                    });
                    container.appendChild(button);
                });
            } catch (error) {
                console.error('Error:', error);
                alert('출고코드 목록을 불러오는데 실패했습니다.');
            }
        }

        async function handleShipmentCodeSelection(shipmentCode, type) {
            try {
                // 현재 테이블의 데이터를 가져옵니다
                const tableBody = document.getElementById('dataBody');
                const rows = tableBody.getElementsByTagName('tr');
                const updateData = [];

                // 선택된 출고코드에 해당하는 행만 처리
                for (let row of rows) {
                    const cells = row.getElementsByTagName('td');
                    const currentShipmentCode = cells[0].textContent;
                    const barcode = cells[6].textContent;
                    const shippingNumber = cells[7].textContent;
                    const center = cells[8].textContent;
                    const quantity = cells[9].textContent;
                    
                    if (currentShipmentCode === shipmentCode && barcode && quantity) {
                        // "000000000" 발주번호는 처리하지 않음
                        if (shippingNumber === '000000000') continue;
                        
                        // 각 주문에 대해 업데이트 데이터 생성
                        updateData.push({
                            orderNumber: shippingNumber,
                            barcode,
                            importValue: quantity // 출고개수만 입력
                        });
                    }
                }

                if (updateData.length === 0) {
                    alert('업데이트할 데이터가 없습니다.');
                    return;
                }

                // 서버에 업데이트 요청
                const endpoint = type === 'import1' ? '/api/orders/updateImport1' : '/api/orders/updateImport2';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updateData)
                });

                if (!response.ok) {
                    throw new Error(`${type === 'import1' ? '입고1' : '입고2'} 정리 중 오류가 발생했습니다.`);
                }

                const result = await response.json();
                // 서버에서 받은 메시지가 있으면 표시, 없으면 기본 메시지 표시
                alert(result.message || `${type === 'import1' ? '입고1' : '입고2'} 정리가 완료되었습니다.`);
                
                // 모달 닫기
                if (type === 'import1') {
                    closeImport1Modal();
                } else {
                    closeImport2Modal();
                }
                
                // 현재 페이지의 테이블을 새로고침
                loadImportData();
            } catch (error) {
                console.error('Error:', error);
                alert(error.message);
            }
        }

        // 입고1, 입고2 버튼 클릭 이벤트
        document.getElementById('import1Button').addEventListener('click', showImport1Modal);
        document.getElementById('import2Button').addEventListener('click', showImport2Modal);

        // 입고1/2 초기화 버튼 클릭 이벤트
        document.getElementById('orderOrganizeButton').addEventListener('click', async () => {
            if (!confirm('입고1과 입고2의 모든 데이터를 초기화하시겠습니까?')) {
                return;
            }

            try {
                const response = await fetch('/api/orders/resetImport12', {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error('초기화 중 오류가 발생했습니다.');
                }

                alert('입고1과 입고2의 데이터가 초기화되었습니다.');
                loadImportData();
            } catch (error) {
                console.error('Error:', error);
                alert(error.message);
            }
        });
    </script>
</body>
</html>
