<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고준비</title>
    <style>
        :root{
            --bg:#f3f4f6; --card:#fff; --ink:#0f172a; --ink-soft:#374151; --muted:#94a3b8;
            --line:#eef2f7; --primary:#4f46e5; --primary-dark:#4338ca; --hover:#f8fafc;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink-soft);font-size:13.5px;-webkit-font-smoothing:antialiased;}
        .page{max-width:1720px;width:96%;margin:22px auto;}
        .card{background:var(--card);border:1px solid #edeff3;border-radius:16px;box-shadow:0 1px 3px rgba(15,23,42,.05),0 10px 30px rgba(15,23,42,.035);padding:22px 24px 18px;}
        .head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
        .title-wrap{display:flex;align-items:baseline;gap:12px;}
        .title{font-size:20px;font-weight:700;color:var(--ink);margin:0;letter-spacing:-.3px;}
        .subtitle{font-size:13px;color:var(--muted);font-weight:500;}
        .subtitle b{color:var(--primary);font-weight:600;}
        .actions{display:flex;align-items:center;gap:8px;}
        .btn{height:38px;padding:0 15px;border:1px solid #e2e8f0;background:#fff;color:#334155;border-radius:9px;font-size:13.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s;white-space:nowrap;}
        .btn:hover{background:var(--hover);border-color:#cbd5e1;}
        .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;box-shadow:0 1px 2px rgba(79,70,229,.25);}
        .btn.primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);}
        .btn:disabled{opacity:.55;cursor:default;}

        .filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
        .filters select{height:38px;padding:0 10px;border:1px solid #e2e8f0;border-radius:9px;background:#fff;color:#334155;font-size:13.5px;cursor:pointer;outline:none;}
        .filters input{flex:1;min-width:240px;height:38px;padding:0 14px;border:1px solid #e5e9f0;border-radius:9px;background:#fff;font-size:13.5px;color:var(--ink);outline:none;}
        .filters input:focus{border-color:#c7d2fe;box-shadow:0 0 0 4px rgba(99,102,241,.10);}

        .table-scroll{overflow-x:auto;max-height:72vh;overflow-y:auto;}
        table{width:100%;border-collapse:collapse;min-width:1050px;}
        thead th{position:sticky;top:0;z-index:2;background:#f1f3f6;text-align:left;font-size:12px;font-weight:600;color:#8b94a3;padding:10px 10px;border:1px solid #dfe3ea;white-space:nowrap;}
        thead th.ctr{text-align:center;}
        tbody td{padding:8px 10px;border:1px solid #e8ebf1;color:var(--ink-soft);font-size:12.5px;white-space:nowrap;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;}
        tbody tr:hover td{background:var(--hover);}
        td.ctr{text-align:center;font-variant-numeric:tabular-nums;}
        td.pname{white-space:normal;color:#334155;}
        td.code{font-weight:600;color:#1e293b;}
        td.loc-text{font-weight:600;color:#1e293b;}
        tbody tr.latest td{background:#f5f7ff;}
        tbody tr.latest:hover td{background:#eef1fe;}
        .batch-badge{display:inline-block;min-width:26px;text-align:center;background:#eef2ff;color:#4f46e5;border:1px solid #c7d2fe;border-radius:7px;padding:1px 7px;font-weight:700;font-size:12px;}
        tr.latest .batch-badge{background:var(--primary);color:#fff;border-color:var(--primary);}
        .new-tag{display:inline-block;margin-left:5px;background:#f0492f;color:#fff;border-radius:6px;padding:0 5px;font-size:10.5px;font-weight:700;vertical-align:1px;}
        .state-row td{text-align:center;padding:48px 12px;color:var(--muted);}
        .table-scroll::-webkit-scrollbar{width:10px;height:10px;}
        .table-scroll::-webkit-scrollbar-thumb{background:#d7dee8;border-radius:8px;border:2px solid #fff;}

        #toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:13px 20px;border-radius:10px;font-size:13.5px;line-height:1.5;box-shadow:0 8px 24px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:9999;max-width:90vw;white-space:pre-line;text-align:center;}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="page">
        <div class="card">
            <div class="head">
                <div class="title-wrap">
                    <h1 class="title">재고준비 <span style="font-size:18px">📦</span></h1>
                    <span class="subtitle">회차 <b id="batchCount">0</b> · 행 <b id="rowCount">0</b> · 총수량 <b id="qtySum">0</b></span>
                </div>
                <div class="actions">
                    <button class="btn" onclick="window.print()">인쇄</button>
                    <button class="btn primary" id="runBtn" onclick="runPrepare()">출고준비</button>
                </div>
            </div>

            <div class="filters">
                <select id="monthSel" onchange="render()"><option value="">전체 월</option></select>
                <select id="batchSel" onchange="render()"><option value="">전체 회차</option></select>
                <input id="searchInput" type="text" placeholder="발주번호 · 물류센터 · 상품명 · 바코드 · 위치 검색 후 Enter" onkeydown="if(event.key==='Enter')render()">
            </div>

            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th class="ctr" style="width:64px">회차</th>
                            <th class="ctr" style="width:96px">준비일</th>
                            <th style="width:110px">발주번호</th>
                            <th style="width:96px">물류센터</th>
                            <th class="ctr" style="width:96px">입고예정일</th>
                            <th>상품명</th>
                            <th style="width:140px">바코드</th>
                            <th style="width:96px">위치</th>
                            <th class="ctr" style="width:64px">수량</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"><tr class="state-row"><td colspan="9">불러오는 중…</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        fetch('/header').then(r=>r.text()).then(h=>{document.getElementById('header-container').innerHTML=h;});

        let rows=[];        // [{batchNo, preparedAt, orderNumber, center, shippingDate, productName, barcode, location, qty, createdAt}]
        let maxBatch=0;

        const esc=v=>String(v==null?'':v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
        // 준비일: prepared_at(회차 실행 시각) 우선, 없으면 created_at — YYYY-MM-DD
        function prepDate(r){ const t=r.preparedAt||r.createdAt; if(!t)return ''; const m=String(t).match(/^(\d{4})-(\d{2})-(\d{2})/); return m?`${m[1]}-${m[2]}-${m[3]}`:''; }
        function prepMonth(r){ const d=prepDate(r); return d?d.slice(0,7):''; }
        function ymd(s){ const m=String(s||'').match(/^(\d{4})(\d{2})(\d{2})$/); return m?`${m[1]}-${m[2]}-${m[3]}`:String(s||''); }

        async function loadData(){
            try{
                const res=await fetch('/api/shipping-list?source=재고');
                if(!res.ok) throw new Error('출고리스트 조회 실패');
                rows=await res.json();
                maxBatch=rows.reduce((m,r)=>Math.max(m,r.batchNo||0),0);
                // 필터 옵션 구성 (월: 최신순 / 회차: 큰 번호부터, 회차없음 포함)
                const months=[...new Set(rows.map(prepMonth).filter(Boolean))].sort().reverse();
                const mSel=document.getElementById('monthSel');
                mSel.innerHTML='<option value="">전체 월</option>'+months.map(m=>`<option value="${m}">${m}</option>`).join('');
                const batches=[...new Set(rows.map(r=>r.batchNo||0))].sort((a,b)=>b-a);
                const bSel=document.getElementById('batchSel');
                bSel.innerHTML='<option value="">전체 회차</option>'+batches.map(b=>`<option value="${b}">${b===0?'회차없음':b+'회차'}${b===maxBatch&&b>0?' (최신)':''}</option>`).join('');
                render();
            }catch(e){
                document.getElementById('tbody').innerHTML=`<tr class="state-row"><td colspan="9">${esc(e.message)}</td></tr>`;
            }
        }

        function filtered(){
            const month=document.getElementById('monthSel').value;
            const batch=document.getElementById('batchSel').value;
            const terms=document.getElementById('searchInput').value.toLowerCase().split(',').map(t=>t.trim()).filter(Boolean);
            return rows.filter(r=>{
                if(month && prepMonth(r)!==month) return false;
                if(batch!=='' && String(r.batchNo||0)!==batch) return false;
                if(terms.length){
                    const hay=[r.orderNumber,r.center,r.productName,r.barcode,r.location].map(v=>String(v||'').toLowerCase());
                    if(!terms.some(t=>hay.some(h=>h.includes(t)))) return false;
                }
                return true;
            });
        }

        function render(){
            const list=filtered();
            // 정렬: 회차 desc → 발주번호 → 바코드 → 위치
            list.sort((a,b)=>(b.batchNo||0)-(a.batchNo||0)
                || String(a.orderNumber||'').localeCompare(String(b.orderNumber||''))
                || String(a.barcode||'').localeCompare(String(b.barcode||''))
                || String(a.location||'').localeCompare(String(b.location||''),'ko',{numeric:true}));
            const tb=document.getElementById('tbody');
            if(!list.length){ tb.innerHTML='<tr class="state-row"><td colspan="9">데이터가 없습니다. [출고준비]를 실행해보세요.</td></tr>'; }
            else{
                tb.innerHTML=list.map(r=>{
                    const isLatest=maxBatch>0&&r.batchNo===maxBatch;
                    return `<tr${isLatest?' class="latest"':''}>
                        <td class="ctr"><span class="batch-badge">${r.batchNo||'-'}</span>${isLatest?'<span class="new-tag">NEW</span>':''}</td>
                        <td class="ctr">${esc(prepDate(r))}</td>
                        <td class="code">${esc(r.orderNumber)}</td>
                        <td>${esc(r.center)}</td>
                        <td class="ctr">${esc(ymd(r.shippingDate))}</td>
                        <td class="pname">${esc(r.productName)}</td>
                        <td>${esc(r.barcode)}</td>
                        <td class="loc-text">${esc(r.location)}</td>
                        <td class="ctr"><b>${Number(r.qty)||0}</b></td>
                    </tr>`;
                }).join('');
            }
            document.getElementById('rowCount').textContent=list.length;
            document.getElementById('qtySum').textContent=list.reduce((s,r)=>s+(Number(r.qty)||0),0).toLocaleString();
            document.getElementById('batchCount').textContent=new Set(rows.map(r=>r.batchNo||0)).size ? [...new Set(rows.map(r=>r.batchNo).filter(b=>b>0))].length : 0;
        }

        // ── 출고준비 실행: 발주서 전체 대상 재고 배정 → 새 회차로 저장 ──
        async function runPrepare(){
            if(!confirm('출고준비를 실행하시겠습니까?\n발주서에서 재고로 나갈 수 있는 상품을 새 회차로 배정합니다.\n(이미 배정된 출고예정 수량은 중복 배정되지 않습니다)')) return;
            const btn=document.getElementById('runBtn');
            btn.disabled=true; const org=btn.textContent; btn.textContent='배정 중…';
            try{
                const res=await fetch('/api/stock-prepare/run',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
                const data=await res.json();
                if(!res.ok) throw new Error(data.error||'출고준비 실패');
                if(data.saved>0) toast(`출고준비 완료 — ${data.batch}회차 · ${data.saved}행 · ${Number(data.totalQty).toLocaleString()}개 배정`);
                else toast('새로 배정할 항목이 없습니다. (재고 부족 또는 이미 전부 배정됨)');
                await loadData();
            }catch(e){ toast('출고준비 실패: '+e.message); }
            finally{ btn.disabled=false; btn.textContent=org; }
        }

        let toastTimer;
        function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3600);}

        loadData();
    </script>
</body>
</html>
