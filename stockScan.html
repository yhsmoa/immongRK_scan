<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고스캔</title>
    <style>
        :root{
            --bg:#f3f4f6; --card:#fff; --ink:#0f172a; --ink-soft:#374151; --muted:#94a3b8;
            --line:#eef2f7; --primary:#4f46e5; --primary-dark:#4338ca; --blue:#2563eb; --hover:#f8fafc;
            --orange:#F0492F;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink-soft);font-size:13.5px;-webkit-font-smoothing:antialiased;}
        .page{max-width:1720px;width:96%;margin:22px auto;}
        .card{background:var(--card);border:1px solid #edeff3;border-radius:16px;box-shadow:0 1px 3px rgba(15,23,42,.05),0 10px 30px rgba(15,23,42,.035);padding:20px 22px;}
        .head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
        .title-wrap{display:flex;align-items:baseline;gap:12px;}
        .title{font-size:20px;font-weight:700;color:var(--ink);margin:0;letter-spacing:-.3px;}
        .subtitle{font-size:13px;color:var(--muted);font-weight:500;}
        .subtitle b{color:var(--primary);font-weight:600;}

        .btn{height:40px;padding:0 16px;border:1px solid #e2e8f0;background:#fff;color:#334155;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s;white-space:nowrap;}
        .btn:hover{background:var(--hover);border-color:#cbd5e1;}
        .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 1px 2px rgba(79,70,229,.25);}
        .btn.primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);}
        .btn:disabled{opacity:.5;cursor:default;background:#fff;border-color:#e2e8f0;color:#94a3b8;}
        .btn:disabled:hover{background:#fff;border-color:#e2e8f0;}

        /* 2분할 */
        .split{display:flex;gap:16px;align-items:flex-start;}
        .left{flex:4 1 0;min-width:0;}   /* 4:6 분할 */
        .right{flex:6 1 0;min-width:0;}
        @media (max-width:820px){ .split{flex-direction:column;} .left,.right{flex:none;width:100%;} }

        /* 왼쪽 입력 */
        .scan-box{background:#fff;border:1px solid #edeff3;border-radius:14px;padding:16px;}
        .scan-field{margin-bottom:16px;}
        .scan-field:last-child{margin-bottom:0;}
        .scan-field label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:7px;}
        .scan-field input{width:100%;height:240px;padding:0 16px;border:2px solid #e5e9f0;border-radius:12px;background:#fff;font-size:78px;font-weight:700;color:var(--ink);outline:none;text-align:center;caret-color:transparent;cursor:pointer;transition:border-color .12s,box-shadow .12s,background .12s;}
        .scan-field input::placeholder{color:#cbd5e1;font-weight:500;font-size:24px;}
        .scan-field input:focus{border-color:#c7d2fe;box-shadow:0 0 0 4px rgba(99,102,241,.12);background:#fff;}
        .scan-field.loc input:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.12);background:#fff;}
        /* 위치: 입력 중/빈값 = 흰배경, Enter 확정 후 = 파란 배경 + 현재위치 표시 */
        .scan-field.loc input.has-loc{background:#DBEAFE;border-color:#93c5fd;color:#2563eb;font-weight:800;}

        /* 오른쪽 테이블 */
        .right-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
        .right-head .cnt{font-size:13px;color:var(--muted);}
        .right-head .cnt b{color:var(--primary);font-weight:700;}
        .table-scroll{overflow:auto;max-height:calc(100vh - 250px);border:1px solid #edeff3;border-radius:12px;} /* 오른쪽 테이블 내부 스크롤 */
        thead th{position:sticky;top:0;z-index:2;}
        table{width:100%;border-collapse:collapse;min-width:520px;}
        thead th{background:#f1f3f6;text-align:left;font-size:12px;font-weight:600;color:#8b94a3;padding:11px 12px;border-bottom:1px solid #dfe3ea;white-space:nowrap;}
        thead th.ctr{text-align:center;}
        tbody td{padding:12px;border-bottom:1px solid #eef2f7;color:var(--ink-soft);font-size:13.5px;vertical-align:middle;}
        tbody tr:last-child td{border-bottom:none;}
        tbody tr:hover td{background:var(--hover);}
        td.loc{font-weight:700;color:#1e293b;white-space:nowrap;text-align:center;}
        td.bc{white-space:nowrap;color:#475569;font-variant-numeric:tabular-nums;text-align:center;}
        td.pname{white-space:normal;word-break:break-word;color:#334155;line-height:1.5;}  /* 좁으면 2줄 줄바꿈 */
        .name-badge{display:inline-block;background:#eef2ff;color:#4f46e5;border:1px solid #e0e7ff;border-radius:6px;padding:0 7px;font-weight:700;font-size:12.5px;white-space:nowrap;}
        td.qty{text-align:center;font-variant-numeric:tabular-nums;}
        td.qty .qcell{display:inline-flex;min-width:44px;height:34px;align-items:center;justify-content:center;padding:0 10px;border:1px solid #e2e8f0;border-radius:9px;font-size:16px;font-weight:700;color:#1e293b;cursor:pointer;background:#fff;user-select:none;}
        td.qty .qcell:hover{border-color:#c7d2fe;background:#f8faff;}
        td.del{text-align:center;white-space:nowrap;}
        .del-btn{height:32px;padding:0 12px;border:1px solid #fecaca;background:#fff;color:#dc2626;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
        .del-btn:hover{background:#fef2f2;}
        .state-row td{text-align:center;padding:44px 12px;color:var(--muted);}
        .table-scroll::-webkit-scrollbar{height:10px;}
        .table-scroll::-webkit-scrollbar-thumb{background:#d7dee8;border-radius:8px;border:2px solid #fff;}

        /* 숫자패드 모달 */
        .np-back{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:10000;}
        .np-back.show{display:flex;}
        .np{background:#fff;border-radius:16px;padding:18px;width:300px;max-width:92vw;box-shadow:0 20px 50px rgba(15,23,42,.3);}
        .np-title{font-size:13px;color:var(--muted);margin:0 0 4px;}
        .np-title b{color:#1e293b;}
        .np-display{height:58px;border:2px solid #e5e9f0;border-radius:12px;display:flex;align-items:center;justify-content:flex-end;padding:0 16px;font-size:28px;font-weight:800;color:var(--ink);margin-bottom:12px;font-variant-numeric:tabular-nums;}
        .np-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
        .np-grid button{height:56px;border:1px solid #e2e8f0;background:#fff;border-radius:12px;font-size:22px;font-weight:700;color:#1e293b;cursor:pointer;}
        .np-grid button:hover{background:#f8faff;border-color:#c7d2fe;}
        .np-grid button.fn{font-size:18px;color:#64748b;background:#f8fafc;}
        .np-btns{display:flex;gap:8px;margin-top:12px;}
        .np-btns .btn{flex:1;justify-content:center;height:46px;}

        #toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:13px 20px;border-radius:10px;font-size:13.5px;line-height:1.5;box-shadow:0 8px 24px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:9999;max-width:90vw;white-space:pre-line;text-align:center;}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="page">
        <div class="card">
            <div class="head">
                <div class="title-wrap">
                    <h1 class="title">재고스캔</h1>
                    <span class="subtitle">스캔 <b id="rowCount">0</b>건 · 총 <b id="qtySum">0</b>개</span>
                </div>
            </div>

            <div class="split">
                <!-- 왼쪽: 입력 -->
                <div class="left">
                    <div class="scan-box">
                        <div class="scan-field loc">
                            <label>① 위치 스캔</label>
                            <input id="locInput" type="text" inputmode="none" placeholder="위치 바코드 스캔 후 Enter" autocomplete="off">
                        </div>
                        <div class="scan-field">
                            <label>② 바코드 스캔</label>
                            <input id="bcInput" type="text" inputmode="none" placeholder="상품 바코드 스캔 후 Enter" autocomplete="off">
                        </div>
                    </div>
                </div>

                <!-- 오른쪽: 결과 테이블 -->
                <div class="right">
                    <div class="right-head">
                        <div class="cnt">스캔 목록 (최신순) · <b id="rowCount2">0</b>건</div>
                        <button class="btn" id="saveBtn" onclick="saveScan()" disabled>저장</button>
                    </div>
                    <div class="table-scroll">
                        <table>
                            <colgroup>
                                <col style="width:110px"><col style="width:150px"><col><col style="width:88px"><col style="width:78px">
                            </colgroup>
                            <thead>
                                <tr><th class="ctr">위치</th><th class="ctr">바코드</th><th>상품명</th><th class="ctr">개수</th><th class="ctr">삭제</th></tr>
                            </thead>
                            <tbody id="tbody"><tr class="state-row"><td colspan="5">위치 → 바코드 순으로 스캔하세요.</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 숫자패드 모달 -->
    <div class="np-back" id="npBack">
        <div class="np">
            <p class="np-title" id="npTitle">개수 수정</p>
            <div class="np-display" id="npDisplay">0</div>
            <div class="np-grid">
                <button onclick="npTap('1')">1</button><button onclick="npTap('2')">2</button><button onclick="npTap('3')">3</button>
                <button onclick="npTap('4')">4</button><button onclick="npTap('5')">5</button><button onclick="npTap('6')">6</button>
                <button onclick="npTap('7')">7</button><button onclick="npTap('8')">8</button><button onclick="npTap('9')">9</button>
                <button class="fn" onclick="npTap('C')">C</button><button onclick="npTap('0')">0</button><button class="fn" onclick="npTap('back')">←</button>
            </div>
            <div class="np-btns">
                <button class="btn" onclick="closeNumpad()">취소</button>
                <button class="btn primary" onclick="npConfirm()">확인</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        fetch('/header').then(r=>r.text()).then(h=>{document.getElementById('header-container').innerHTML=h;}).catch(()=>{});

        const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        let pending=[];          // {key, 위치, 바코드, 상품명, qty, seq}
        let seq=0;
        let currentLocation='';
        const nameCache=new Map();

        const locInput=document.getElementById('locInput');
        const bcInput=document.getElementById('bcInput');

        // ── 위치 입력: 다시 선택(focus)하면 초기화(흰배경), Enter로 확정 → 배경색+값 유지, 바코드로 이동 ──
        locInput.addEventListener('focus',()=>{ locInput.value=''; locInput.classList.remove('has-loc'); });
        locInput.addEventListener('keydown',e=>{
            if(e.key!=='Enter') return;
            e.preventDefault();
            const v=locInput.value.trim();
            if(!v){ toast('위치를 스캔하세요.'); return; }
            currentLocation=v;
            locInput.value=v;                    // 값 유지
            locInput.classList.add('has-loc');   // 배경색 → 현재위치 표시
            bcInput.focus();
        });

        // ── 바코드 입력: Enter로 스캔 반영 후 초기화(위치와 다름), focus 유지(연속 스캔) ──
        bcInput.addEventListener('keydown',e=>{
            if(e.key!=='Enter') return;
            e.preventDefault();
            const bc=bcInput.value.trim();
            if(!bc){ bcInput.value=''; return; }
            if(!currentLocation){ toast('위치를 먼저 스캔하세요.'); bcInput.value=''; locInput.focus(); return; }
            addScan(currentLocation, bc);
            bcInput.value='';      // 바코드는 입력 후 초기화
            bcInput.focus();
        });

        function addScan(location, barcode){
            const key=location+'|'+barcode;
            let row=pending.find(r=>r.key===key);
            if(row){ row.qty++; }
            else{ row={key, 위치:location, 바코드:barcode, 상품명:(nameCache.get(barcode)||''), qty:1, seq:0}; pending.push(row); }
            row.seq=++seq; // 최신이 맨 위
            render();
            if(!nameCache.has(barcode)) lookupName(barcode);
        }

        async function lookupName(barcode){
            try{
                const res=await fetch('/api/stocks/lookup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({barcodes:[barcode]})});
                const arr=await res.json();
                const nm=(arr && arr[0] && arr[0].name) || '';
                nameCache.set(barcode, nm);
                pending.filter(r=>r.바코드===barcode).forEach(r=>{ r.상품명=nm; });
                render();
            }catch(e){ /* 조회 실패 시 상품명 공란 유지 */ }
        }

        // 상품명: 첫 콤마 바로 앞 토큰이 영문+숫자(모델코드)면 배지 처리
        function pnameHtml(name){
            if(!name) return '<span style="color:#cbd5e1">-</span>';
            const ci=name.indexOf(',');
            if(ci>0){
                const prefix=name.slice(0,ci), rest=name.slice(ci);
                const m=prefix.match(/(\S+)\s*$/);
                if(m){
                    const token=m[1];
                    if(/^[A-Za-z0-9]+$/.test(token) && /[A-Za-z]/.test(token) && /\d/.test(token)){
                        const before=prefix.slice(0, prefix.length - m[0].length);
                        return esc(before)+' <span class="name-badge">'+esc(token)+'</span>'+esc(rest);
                    }
                }
            }
            return esc(name);
        }

        function render(){
            const tb=document.getElementById('tbody');
            const rows=pending.slice().sort((a,b)=>b.seq-a.seq); // 최신 스캔 맨 위
            if(!rows.length){
                tb.innerHTML=`<tr class="state-row"><td colspan="5">위치 → 바코드 순으로 스캔하세요.</td></tr>`;
            }else{
                tb.innerHTML=rows.map(r=>`<tr>
                    <td class="loc">${esc(r.위치)}</td>
                    <td class="bc">${esc(r.바코드)}</td>
                    <td class="pname">${pnameHtml(r.상품명)}</td>
                    <td class="qty"><span class="qcell" onclick="openNumpad('${esc(r.key)}')">${r.qty}</span></td>
                    <td class="del"><button class="del-btn" onclick="delRow('${esc(r.key)}')">삭제</button></td>
                </tr>`).join('');
            }
            const cnt=pending.length, sum=pending.reduce((s,r)=>s+r.qty,0);
            document.getElementById('rowCount').textContent=cnt;
            document.getElementById('rowCount2').textContent=cnt;
            document.getElementById('qtySum').textContent=sum;
            document.getElementById('saveBtn').disabled=cnt===0;
            document.getElementById('saveBtn').classList.toggle('primary', cnt>0);
        }

        function delRow(key){
            const r=pending.find(x=>x.key===key); if(!r) return;
            if(!confirm(`삭제하시겠습니까?\n${r.위치} · ${r.바코드} · ${r.qty}개`)) return;
            pending=pending.filter(x=>x.key!==key);
            render();
        }

        // ── 숫자패드 ──
        let npKey=null, npVal='';
        function openNumpad(key){
            const r=pending.find(x=>x.key===key); if(!r) return;
            npKey=key; npVal=String(r.qty);
            document.getElementById('npTitle').innerHTML=`개수 수정 · <b>${esc(r.위치)} / ${esc(r.바코드)}</b>`;
            updateNpDisplay();
            document.getElementById('npBack').classList.add('show');
        }
        function closeNumpad(){ document.getElementById('npBack').classList.remove('show'); npKey=null; }
        function npTap(d){
            if(d==='C') npVal='';
            else if(d==='back') npVal=npVal.slice(0,-1);
            else npVal=(npVal+d).replace(/^0+(?=\d)/,'').slice(0,6);
            updateNpDisplay();
        }
        function updateNpDisplay(){ document.getElementById('npDisplay').textContent=npVal||'0'; }
        function npConfirm(){
            const n=parseInt(npVal,10);
            if(!Number.isFinite(n)||n<1){ toast('1 이상 숫자를 입력하세요.'); return; }
            const r=pending.find(x=>x.key===npKey);
            if(r){ r.qty=n; render(); }
            closeNumpad();
        }
        document.getElementById('npBack').addEventListener('click',e=>{ if(e.target.id==='npBack') closeNumpad(); });

        // ── 저장 ──
        async function saveScan(){
            if(!pending.length){ toast('저장할 스캔이 없습니다.'); return; }
            const items=pending.map(r=>({location:r.위치, barcode:r.바코드, qty:r.qty}));
            const btn=document.getElementById('saveBtn'); btn.disabled=true;
            toast('저장 중…');
            try{
                const res=await fetch('/api/stocks/scan-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items})});
                const data=await res.json().catch(()=>({}));
                if(!res.ok) throw new Error(data.error||'저장 실패');
                pending=[]; render();
                toast(`저장 완료 (합산 ${data.updated||0}건, 신규 ${data.inserted||0}건)`);
                locInput.focus();
            }catch(e){ render(); toast('저장 실패: '+e.message); }
        }

        // ── 미저장 이탈 경고 ──
        window.addEventListener('beforeunload', function(e){
            if(pending.length){ e.preventDefault(); e.returnValue=''; return ''; }
        });

        // ── 토스트 ──
        let toastTimer;
        function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);}

        // 초기 focus
        setTimeout(()=>locInput.focus(), 300);
    </script>
</body>
</html>
