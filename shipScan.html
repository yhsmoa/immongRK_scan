<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출고스캔</title>
    <style>
        :root{
            --bg:#f3f4f6; --card:#fff; --ink:#0f172a; --ink-soft:#374151; --muted:#94a3b8;
            --line:#eef2f7; --primary:#4f46e5; --primary-dark:#4338ca; --blue:#2563eb; --hover:#f8fafc;
        }
        *{box-sizing:border-box;}
        body{margin:0;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink-soft);font-size:13.5px;-webkit-font-smoothing:antialiased;}
        .page{max-width:1720px;width:96%;margin:22px auto;}
        .card{background:var(--card);border:1px solid #edeff3;border-radius:16px;box-shadow:0 1px 3px rgba(15,23,42,.05),0 10px 30px rgba(15,23,42,.035);padding:20px 22px;}
        .head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
        .title-wrap{display:flex;align-items:baseline;gap:12px;}
        .title{font-size:20px;font-weight:700;color:var(--ink);margin:0;letter-spacing:-.3px;}
        .subtitle{font-size:13px;color:var(--muted);font-weight:500;}
        .subtitle b{color:var(--primary);font-weight:600;}

        .btn{height:40px;padding:0 16px;border:1px solid #e2e8f0;background:#fff;color:#334155;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s;white-space:nowrap;}
        .btn:hover{background:var(--hover);border-color:#cbd5e1;}
        .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 1px 2px rgba(79,70,229,.25);}
        .btn.primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);}
        .btn:disabled{opacity:.5;cursor:default;background:#fff;border-color:#e2e8f0;color:#94a3b8;}
        .btn:disabled:hover{background:#fff;border-color:#e2e8f0;}

        /* 2분할 4:6 */
        .split{display:flex;gap:16px;align-items:flex-start;}
        .left{flex:4 1 0;min-width:0;}
        .right{flex:6 1 0;min-width:0;}
        @media (max-width:820px){ .split{flex-direction:column;} .left,.right{flex:none;width:100%;} }

        /* 왼쪽 입력 */
        .scan-box{background:#fff;border:1px solid #edeff3;border-radius:14px;padding:16px;}
        .scan-field{margin-bottom:16px;}
        .scan-field:last-child{margin-bottom:0;}
        .scan-field label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:7px;}
        .scan-field input{width:100%;height:180px;padding:0 16px;border:2px solid #e5e9f0;border-radius:12px;background:#fff;font-size:58px;font-weight:700;color:var(--ink);outline:none;text-align:center;caret-color:transparent;cursor:pointer;transition:border-color .12s,box-shadow .12s,background .12s;}
        .scan-field input::placeholder{color:#cbd5e1;font-weight:500;font-size:22px;}
        .scan-field input:focus{border-color:#c7d2fe;box-shadow:0 0 0 4px rgba(99,102,241,.12);background:#fff;}
        .scan-field.ord input:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.12);background:#fff;}
        .scan-field.ord input.has-ord{background:#DBEAFE;border-color:#93c5fd;color:#2563eb;font-weight:800;} /* 유효 발주서 확정 */
        .scan-field.ord input.locked{pointer-events:none;} /* 조회 후 재입력/초기화 방지 */
        /* 조회 후 입력폼 자리에 표시되는 박스 (발주서 파랑 + 줄바꿈 물류센터) */
        .ord-display{width:100%;height:180px;border:2px solid #93c5fd;border-radius:12px;background:#DBEAFE;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#2563eb;text-align:center;padding:0 12px;}
        .ord-display .od-no{font-size:44px;font-weight:800;line-height:1.05;word-break:break-all;}
        .ord-display .od-center{font-size:28px;font-weight:800;}

        /* 박스 컨트롤 */
        .box-control{margin-bottom:16px;}
        .box-btn{width:100%;height:64px;border:2px solid #e5e9f0;border-radius:12px;background:#fff;font-size:29px;font-weight:800;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
        .box-btn:hover{border-color:#c7d2fe;background:#f8faff;}
        .box-btn.empty{color:#94a3b8;font-weight:600;font-size:19px;}
        .size-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px;}
        .size-btn{height:64px;border:1px solid #e2e8f0;background:#fff;border-radius:9px;font-size:15px;font-weight:700;color:#475569;cursor:pointer;} /* 높이 = 박스 선택 버튼과 통일 */
        .size-btn:hover{background:#f8faff;border-color:#c7d2fe;}
        .size-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
        .size-btn:disabled{opacity:.4;cursor:default;background:#f8fafc;color:#94a3b8;}
        .size-btn:disabled:hover{background:#f8fafc;border-color:#e2e8f0;}

        /* 오른쪽 */
        .right-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;}
        .right-head .cnt{font-size:13px;color:var(--muted);}
        .right-head .cnt b{color:var(--primary);font-weight:700;}
        .sec-title{font-size:12.5px;font-weight:700;color:#64748b;margin:14px 2px 6px;}
        .hdr-wrap{border:1px solid #edeff3;border-radius:12px;overflow:auto;max-height:180px;}
        .table-scroll{overflow:auto;max-height:calc(100vh - 320px);min-height:240px;border:1px solid #edeff3;border-radius:12px;}
        table{width:100%;border-collapse:collapse;min-width:480px;}
        thead th{position:sticky;top:0;z-index:2;background:#f1f3f6;text-align:left;font-size:12px;font-weight:600;color:#8b94a3;padding:10px 12px;border-bottom:1px solid #dfe3ea;white-space:nowrap;}
        thead th.ctr{text-align:center;}
        tbody td{padding:11px 12px;border-bottom:1px solid #eef2f7;color:var(--ink-soft);font-size:13.5px;vertical-align:middle;}
        tbody tr:last-child td{border-bottom:none;}
        tbody tr:hover td{background:var(--hover);}
        @keyframes rowPulse{0%,100%{background:#fff;}50%{background:#FDEBE6;}}
        tbody tr.row-latest td{animation:rowPulse 1.8s ease-in-out infinite;}
        tbody tr.row-done td{background:#dcfce7 !important;} /* 발주수량=스캔수량 → 연한 초록 */
        .table-scroll thead th,.table-scroll tbody td{border:1px solid #e2e8f0;} /* 스캔목록 테두리 */
        td.box{font-weight:800;color:#1e293b;white-space:nowrap;text-align:center;}
        td.bc{white-space:nowrap;color:#475569;font-variant-numeric:tabular-nums;text-align:center;}
        td.pname{white-space:normal;word-break:break-word;color:#334155;line-height:1.5;}
        .name-badge{display:inline-block;background:#eef2ff;color:#4f46e5;border:1px solid #e0e7ff;border-radius:6px;padding:0 7px;font-weight:700;font-size:12.5px;white-space:nowrap;}
        td.qty{text-align:center;font-variant-numeric:tabular-nums;font-weight:700;font-size:16px;color:#1e293b;}
        td.ctr{text-align:center;}
        .state-row td{text-align:center;padding:36px 12px;color:var(--muted);}
        .table-scroll::-webkit-scrollbar,.hdr-wrap::-webkit-scrollbar{width:10px;height:10px;}
        .table-scroll::-webkit-scrollbar-thumb,.hdr-wrap::-webkit-scrollbar-thumb{background:#d7dee8;border-radius:8px;border:2px solid #fff;}

        /* 박스 선택 모달 */
        .boxm-back{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:10000;}
        .boxm-back.show{display:flex;}
        .boxm{background:#fff;border-radius:16px;padding:20px;width:440px;max-width:94vw;box-shadow:0 20px 50px rgba(15,23,42,.3);}
        .boxm h3{margin:0 0 4px;font-size:16px;color:var(--ink);}
        .boxm p{margin:0 0 14px;font-size:12.5px;color:var(--muted);}
        .boxm-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
        .box-cell{border:1px solid #e2e8f0;border-radius:12px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:16px 6px;filter:grayscale(1);opacity:.55;}
        .box-cell .emoji{font-size:36px;line-height:1;}
        .box-cell .type{font-size:12.5px;font-weight:700;color:#64748b;line-height:1;}
        .box-cell .no{font-size:15px;font-weight:800;color:#1e293b;line-height:1;}
        .box-cell.exists{filter:none;opacity:1;background:#eef2ff;border-color:#c7d2fe;} /* 이미 생성된 박스 = 컬러 */
        .box-cell:hover{border-color:#93c5fd;}
        .box-cell.sel{outline:3px solid #4f46e5;outline-offset:-1px;}

        /* 기록 슬라이드 패널 */
        .rec-back{position:fixed;inset:0;background:rgba(15,23,42,.35);opacity:0;pointer-events:none;transition:opacity .2s;z-index:10001;}
        .rec-back.show{opacity:1;pointer-events:auto;}
        .rec-panel{position:fixed;top:0;right:0;height:100vh;width:598px;max-width:94vw;background:#fff;box-shadow:-8px 0 30px rgba(15,23,42,.15);transform:translateX(100%);transition:transform .25s ease;z-index:10002;display:flex;flex-direction:column;}
        .rec-panel.show{transform:translateX(0);}
        .rec-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid #eef2f7;font-size:15px;font-weight:700;color:#0f172a;}
        .rec-head .sub{font-size:12px;font-weight:500;color:#94a3b8;margin-left:6px;}
        .rec-head button{border:none;background:transparent;font-size:18px;cursor:pointer;color:#94a3b8;}
        .rec-body{overflow:auto;flex:1;}
        .rec-body table{min-width:0;}
        .rec-body thead th{background:#f8fafc;border:1px solid #e2e8f0;}
        .rec-body tbody td{border:1px solid #eef2f7;}
        .list-boxbtns{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px;border-bottom:1px solid #eef2f7;}
        .lbx{border:1px solid #c7d2fe;border-radius:10px;background:#eef2ff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;min-width:62px;}
        .lbx:hover{background:#e0e7ff;}
        .lbx .e{font-size:22px;line-height:1;}
        .lbx .t{font-size:11px;font-weight:700;color:#64748b;line-height:1;}
        .lbx .n{font-size:14px;font-weight:800;color:#1e293b;line-height:1;}
        .lbx.sel{outline:2px solid #4f46e5;outline-offset:-1px;background:#dbeafe;}
        .detail-title{padding:10px 14px 6px;font-size:14px;font-weight:700;color:#0f172a;}
        .detail-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 14px 6px;}
        .detail-bar .detail-title{padding:0;}
        .btn-del-all{height:32px;padding:0 12px;border:1px solid #fecaca;background:#fff;color:#dc2626;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
        .btn-del-all:hover:not(:disabled){background:#fef2f2;border-color:#fca5a5;}
        .btn-del-all:disabled{opacity:.45;cursor:default;}
        /* 합치기 */
        .btn-merge{height:32px;padding:0 12px;border:1px solid #c7d2fe;background:#fff;color:var(--primary);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
        .btn-merge:hover:not(:disabled){background:#eef2ff;border-color:#a5b4fc;}
        .btn-merge:disabled{opacity:.45;cursor:default;}
        .btn-merge.on{background:var(--primary);color:#fff;border-color:var(--primary);}
        .merge-picker{display:none;padding:10px 14px 12px;border-bottom:1px solid #eef2f7;background:#f8faff;}
        .merge-picker.show{display:block;}
        .mp-title{font-size:12.5px;font-weight:600;color:#475569;margin-bottom:8px;}
        .mp-boxes{display:flex;flex-wrap:wrap;gap:8px;}
        .mp-box{border:1px solid #c7d2fe;border-radius:10px;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;min-width:62px;}
        .mp-box:hover{background:#eef2ff;border-color:#818cf8;}
        .mp-box .e{font-size:20px;line-height:1;}
        .mp-box .t{font-size:11px;font-weight:700;color:#64748b;line-height:1;}
        .mp-box .n{font-size:14px;font-weight:800;color:#1e293b;line-height:1;}
        .mp-empty{font-size:12.5px;color:var(--muted);}
        .rec-body td.qedit{cursor:pointer;color:#2563eb;font-weight:800;}
        .rec-body td.qedit:hover{background:#eff6ff;}
        .del-emoji{border:none;background:transparent;cursor:pointer;font-size:16px;line-height:1;padding:3px 4px;border-radius:6px;}
        .del-emoji:hover{background:#fef2f2;}
        .pname-link{cursor:pointer;}

        #toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:13px 20px;border-radius:10px;font-size:13.5px;line-height:1.5;box-shadow:0 8px 24px rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:10005;max-width:90vw;white-space:pre-line;text-align:center;}
        #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    </style>
</head>
<body>
    <div id="header-container"></div>

    <div class="page">
        <div class="card">
            <div class="head">
                <div class="title-wrap">
                    <h1 class="title">출고스캔</h1>
                    <span class="subtitle">발주서 <b id="curOrder">-</b> · 미저장 <b id="recCount">0</b>건</span>
                </div>
            </div>

            <div class="split">
                <!-- 왼쪽: 입력 -->
                <div class="left">
                    <div class="scan-box">
                        <div class="scan-field ord">
                            <label>① 발주서</label>
                            <input id="orderInput" type="text" inputmode="none" placeholder="발주번호 스캔/입력 후 Enter" autocomplete="off">
                            <div class="ord-display" id="ordDisplay" style="display:none;">
                                <div class="od-no" id="odNo"></div>
                                <div class="od-center" id="odCenter"></div>
                            </div>
                        </div>
                        <div class="box-control">
                            <label class="scan-field" style="margin:0 0 7px;display:block;font-size:13px;font-weight:600;color:#475569;">② 박스</label>
                            <button class="box-btn empty" id="boxBtn" onclick="openBoxModal()">박스 번호 선택</button>
                            <div class="size-row" id="sizeRow">
                                <button class="size-btn" data-size="극소" onclick="selectSize('극소')" disabled>극소</button>
                                <button class="size-btn" data-size="소" onclick="selectSize('소')" disabled>소</button>
                                <button class="size-btn" data-size="중" onclick="selectSize('중')" disabled>중</button>
                                <button class="size-btn" data-size="대" onclick="selectSize('대')" disabled>대</button>
                                <button class="size-btn" data-size="대2" onclick="selectSize('대2')" disabled>대2</button>
                            </div>
                        </div>
                        <div class="scan-field">
                            <label>③ 바코드 스캔</label>
                            <input id="bcInput" type="text" inputmode="none" placeholder="상품 바코드 스캔 후 Enter" autocomplete="off">
                        </div>
                    </div>
                </div>

                <!-- 오른쪽 -->
                <div class="right">
                    <div class="right-head">
                        <div class="cnt">스캔 목록 · <b id="shipCount">0</b>품목 / 스캔 <b id="shipSum">0</b>개</div>
                        <div style="display:flex;gap:8px;">
                            <button class="btn" id="recBtn" onclick="openRec()">기록</button>
                            <button class="btn" id="listBtn" onclick="openList()">목록</button>
                            <button class="btn" id="saveBtn" onclick="saveShip()" disabled>저장</button>
                            <button class="btn" id="doneBtn" onclick="onDone()" disabled>완료</button>
                        </div>
                    </div>

                    <div class="table-scroll">
                        <table>
                            <colgroup><col style="width:150px"><col><col style="width:84px"><col style="width:84px"></colgroup>
                            <thead><tr><th class="ctr">바코드</th><th>상품명</th><th class="ctr">발주수량</th><th class="ctr">스캔수량</th></tr></thead>
                            <tbody id="shipBody"><tr class="state-row"><td colspan="4">발주서를 조회하세요.</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 박스 선택 모달 -->
    <div class="boxm-back" id="boxmBack">
        <div class="boxm">
            <h3>박스 번호 선택</h3>
            <p>컬러 = 이미 생성된 박스 · 흑백 = 미생성 (선택 시 저장할 때 생성)</p>
            <div class="boxm-grid" id="boxGrid"></div>
        </div>
    </div>

    <!-- 기록 슬라이드 패널 -->
    <div class="rec-back" id="recBack" onclick="closeRec()"></div>
    <div class="rec-panel" id="recPanel">
        <div class="rec-head">
            <span>스캔 기록 <span class="sub" id="recSub"></span></span>
            <button onclick="closeRec()">✕</button>
        </div>
        <div class="rec-body">
            <table>
                <thead><tr><th>박스위치</th><th>바코드</th><th>상품명</th><th class="ctr">개수</th></tr></thead>
                <tbody id="recBody"><tr class="state-row"><td colspan="4">스캔 기록이 없습니다.</td></tr></tbody>
            </table>
        </div>
    </div>

    <!-- 목록(박스별 상품) 슬라이드 패널 -->
    <div class="rec-back" id="listBack" onclick="closeList()"></div>
    <div class="rec-panel" id="listPanel">
        <div class="rec-head">
            <span>박스 목록 <span class="sub" id="listSub"></span></span>
            <button onclick="closeList()">✕</button>
        </div>
        <div class="list-boxbtns" id="listBoxBtns"></div>
        <div class="detail-bar">
            <span class="detail-title" id="listDetailTitle">박스를 선택하세요.</span>
            <div style="display:flex;gap:8px;">
                <button class="btn-merge" id="mergeBtn" onclick="toggleMergePicker()" disabled>합치기</button>
                <button class="btn-del-all" id="delAllBtn" onclick="deleteBox()" disabled>전체삭제</button>
            </div>
        </div>
        <!-- 합치기: 대상 박스 선택 (본인 박스 제외) -->
        <div class="merge-picker" id="mergePicker">
            <div class="mp-title" id="mpTitle"></div>
            <div class="mp-boxes" id="mergeBoxes"></div>
        </div>
        <div class="rec-body">
            <table>
                <colgroup><col style="width:76px"><col style="width:135px"><col><col style="width:74px"><col style="width:42px"></colgroup>
                <thead><tr><th class="ctr">박스</th><th class="ctr">바코드</th><th>상품명</th><th class="ctr">스캔개수</th><th class="ctr">삭제</th></tr></thead>
                <tbody id="listBody"><tr class="state-row"><td colspan="4">박스를 선택하세요.</td></tr></tbody>
            </table>
        </div>
    </div>

    <!-- 바코드 상세 슬라이드 패널 (스캔목록 상품명 클릭) -->
    <div class="rec-back" id="bcBack" onclick="closeBc()"></div>
    <div class="rec-panel" id="bcPanel">
        <div class="rec-head">
            <span>바코드 상세 <span class="sub" id="bcSub"></span></span>
            <button onclick="closeBc()">✕</button>
        </div>
        <div class="detail-title" id="bcDetailTitle"></div>
        <div class="rec-body">
            <table>
                <colgroup><col style="width:76px"><col style="width:135px"><col><col style="width:74px"><col style="width:42px"></colgroup>
                <thead><tr><th class="ctr">박스</th><th class="ctr">바코드</th><th>상품명</th><th class="ctr">스캔개수</th><th class="ctr">삭제</th></tr></thead>
                <tbody id="bcBody"><tr class="state-row"><td colspan="4">-</td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="toast"></div>
    <script src="/numpad.js"></script>

    <script>
        fetch('/header').then(r=>r.text()).then(h=>{document.getElementById('header-container').innerHTML=h;}).catch(()=>{});

        const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

        // 상태
        let currentOrder='';
        let products=[];              // 스캔목록 = 발주서 상품 [{barcode, productName, orderQty, scannedQty}]
        let boxItems=[];              // 작업중 박스 아이템 [{boxNo, barcode, productName, qty}] (저장분+세션, SET 저장)
        let savedBoxes=[];            // [{id, boxNo, boxSize, createdAt}]
        let records=[];               // 기록 로그(표시용, 시간순)
        const boxSizeMap=new Map();   // boxNo -> size (세션/저장)
        let currentBoxNo=null;
        let currentBoxSize=null;   // null = 크기 미선택 (박스 선택 전/신규 박스)
        let lastScanBarcode=null;
        let dirty=false;              // 미저장 변경 여부
        let listSelBox=null;          // 목록 패널에서 선택한 박스
        let bcDetailBc=null;          // 바코드 상세 패널 대상 바코드
        const prodByBarcode=bc=>products.find(p=>p.barcode===bc);
        const boxItemFor=(box,bc)=>boxItems.find(i=>i.boxNo===box&&i.barcode===bc);
        function recomputeScanned(){ const m=new Map(); for(const it of boxItems) m.set(it.barcode,(m.get(it.barcode)||0)+it.qty); products.forEach(p=>p.scannedQty=m.get(p.barcode)||0); }

        const orderInput=document.getElementById('orderInput');
        const bcInput=document.getElementById('bcInput');

        // ── 발주서: focus 시 초기화, Enter 시 유효성 검증 (조회 후 잠금 시 초기화 안 함) ──
        orderInput.addEventListener('focus',()=>{ if(orderInput.classList.contains('locked')) return; orderInput.value=''; orderInput.classList.remove('has-ord'); });
        orderInput.addEventListener('keydown',e=>{
            if(e.key!=='Enter') return;
            e.preventDefault();
            const v=orderInput.value.trim();
            if(!v){ toast('발주번호를 입력하세요.'); return; }
            loadOrder(v);
        });

        async function loadOrder(orderNumber){
            toast('발주서 조회 중…');
            try{
                const res=await fetch('/api/ship-scan/order/'+encodeURIComponent(orderNumber));
                const data=await res.json().catch(()=>({}));
                if(!res.ok || !data.valid){ orderInput.classList.remove('has-ord'); toast(data.error||'존재하지 않는 발주서입니다.'); return; }
                currentOrder=data.orderNumber;
                document.getElementById('curOrder').textContent=currentOrder;
                // 입력폼 자리에 발주서(파랑) + 줄바꿈 물류센터 표시 (입력폼은 숨김)
                document.getElementById('odNo').textContent=currentOrder;
                // 입고예정일 + 공백 + 센터 (예: "20260724 경기광주1")
                document.getElementById('odCenter').textContent=[data.arrivalDate,data.center].filter(Boolean).join(' ')||'-';
                orderInput.value=currentOrder;
                orderInput.style.display='none';
                document.getElementById('ordDisplay').style.display='flex';
                // 스캔목록 = 발주서 상품 리스트 (발주수량=확정수량)
                products=(data.products||[]).map(p=>({barcode:p.barcode, productName:p.productName||'', orderQty:p.confirmedQty||0, scannedQty:0}));
                const nameByBc=new Map(products.map(p=>[p.barcode,p.productName]));
                // 저장된 박스 아이템(박스별)
                boxItems=(data.items||[]).map(i=>({boxNo:i.boxNo, barcode:i.barcode, productName:i.productName||nameByBc.get(i.barcode)||'', qty:i.qty}));
                recomputeScanned();
                // 박스 목록 (저장분)
                savedBoxes=(data.boxes||[]).map(b=>({id:b.id,boxNo:b.boxNo,boxSize:b.boxSize,createdAt:b.createdAt}));
                boxSizeMap.clear(); savedBoxes.forEach(b=>boxSizeMap.set(b.boxNo,b.boxSize));
                records=[]; currentBoxNo=null; lastScanBarcode=null; dirty=false; listSelBox=null;
                setBoxBtn();
                renderAll();
                toast(`발주서 ${currentOrder} 불러옴 (상품 ${products.length}종)`);
            }catch(e){ toast('조회 실패: '+e.message); }
        }

        // ── 박스 선택 ──
        function openBoxModal(){
            if(!currentOrder){ toast('먼저 발주서를 조회하세요.'); return; }
            renderBoxGrid();
            document.getElementById('boxmBack').classList.add('show');
        }
        function closeBoxModal(){ document.getElementById('boxmBack').classList.remove('show'); }
        document.getElementById('boxmBack').addEventListener('click',e=>{ if(e.target.id==='boxmBack') closeBoxModal(); });
        function boxExists(no){ return savedBoxes.some(b=>b.boxNo===no) || boxItems.some(i=>i.boxNo===no); }
        function renderBoxGrid(){
            let html='';
            for(let n=1;n<=20;n++){
                const cls=(boxExists(n)?'exists ':'')+(currentBoxNo===n?'sel':'');
                // 미생성 박스는 크기 타입 표시 안 함 (사용자가 지정한 값이 아니므로)
                const sz=boxExists(n)?(boxSizeOf(n)||''):'';
                html+=`<div class="box-cell ${cls}" onclick="selectBox(${n})"><div class="emoji">📦</div><div class="type">${esc(sz)||'&nbsp;'}</div><div class="no">${n}</div></div>`;
            }
            document.getElementById('boxGrid').innerHTML=html;
        }
        function selectBox(no){
            currentBoxNo=no;
            const saved=savedBoxes.find(b=>b.boxNo===no);
            if(saved){ currentBoxSize=saved.boxSize; }              // 기존 박스 = 그 크기
            else if(boxSizeMap.has(no)){ currentBoxSize=boxSizeMap.get(no); }
            else { currentBoxSize=null; }                            // 신규 박스 = 크기 미선택
            setBoxBtn(); setSizeActive(); closeBoxModal();
            bcInput.focus();
        }
        function setBoxBtn(){
            const b=document.getElementById('boxBtn');
            if(currentBoxNo){ b.textContent='📦 '+currentBoxNo; b.classList.remove('empty'); }
            else{ b.textContent='박스 번호 선택'; b.classList.add('empty'); }
        }
        function selectSize(size){
            if(currentBoxNo==null){ toast('박스를 먼저 선택하세요.'); return; }
            if(currentBoxSize===size){ return; }   // 동일 크기 재선택 = 변경 없음
            currentBoxSize=size;
            boxSizeMap.set(currentBoxNo,size);
            const saved=savedBoxes.find(b=>b.boxNo===currentBoxNo);
            if(saved) saved.boxSize=size;          // 저장된 박스 크기 변경 → 저장 대상
            dirty=true; updateCounts();            // 크기 변경도 [저장] 활성화
            setSizeActive(); renderList();
            bcInput.focus();   // 크기 선택/변경 → 바로 바코드 스캔으로
        }
        // 박스 미선택이면 크기 버튼 비활성, 선택 크기만 active
        function setSizeActive(){
            const enabled=currentBoxNo!=null;
            document.querySelectorAll('.size-btn').forEach(b=>{
                b.disabled=!enabled;
                b.classList.toggle('active', enabled && b.dataset.size===currentBoxSize);
            });
        }

        // ── 바코드 스캔 ──
        bcInput.addEventListener('keydown',e=>{
            if(e.key!=='Enter') return;
            e.preventDefault();
            const bc=bcInput.value.trim();
            bcInput.value='';
            if(!bc) return;
            if(!currentOrder){ toast('먼저 발주서를 조회하세요.'); return; }
            if(currentBoxNo==null){ toast('박스를 먼저 선택하세요.'); return; }
            doScan(currentBoxNo, bc);
            bcInput.focus();
        });

        // ── 효과음 (오디오 파일 없이 브라우저 API로 생성, /scan 과 동일) ──
        function playSuccessSound(){
            try{
                const ac=new (window.AudioContext||window.webkitAudioContext)();
                const osc=ac.createOscillator(), g=ac.createGain();
                osc.type='sine';
                osc.frequency.setValueAtTime(523.25, ac.currentTime);        // C5
                osc.frequency.setValueAtTime(659.25, ac.currentTime+0.1);    // E5
                osc.frequency.setValueAtTime(783.99, ac.currentTime+0.2);    // G5
                osc.frequency.setValueAtTime(1046.50, ac.currentTime+0.3);   // C6
                osc.connect(g); g.connect(ac.destination); g.gain.value=0.5; osc.start();
                setTimeout(()=>osc.stop(), 400);
            }catch(e){}
        }
        function playWarningSound(){
            try{
                const ac=new (window.AudioContext||window.webkitAudioContext)();
                const osc=ac.createOscillator(), g=ac.createGain();
                osc.type='square'; osc.frequency.value=800;
                osc.connect(g); g.connect(ac.destination); g.gain.value=0.7; osc.start();
                setTimeout(()=>{g.gain.value=0;},150); setTimeout(()=>{g.gain.value=0.7;},300);
                setTimeout(()=>{g.gain.value=0;},450); setTimeout(()=>{g.gain.value=0.7;},600);
                setTimeout(()=>osc.stop(), 750);
            }catch(e){}
        }

        function doScan(boxNo, barcode){
            const prod=prodByBarcode(barcode);
            if(!prod){ playWarningSound(); toast('발주서에 없는 바코드입니다.'); return; }
            if(prod.scannedQty >= prod.orderQty){ playWarningSound(); toast(`이미 확정수량(${prod.orderQty})만큼 스캔되었습니다.`); return; }

            const size=savedBoxes.find(b=>b.boxNo===boxNo)?.boxSize || boxSizeMap.get(boxNo) || currentBoxSize || '극소';
            if(!savedBoxes.some(b=>b.boxNo===boxNo)) boxSizeMap.set(boxNo,size);

            // 박스 아이템 증가 (같은 박스+바코드 합산)
            let it=boxItemFor(boxNo,barcode);
            if(it){ it.qty++; } else { it={boxNo, barcode, productName:prod.productName, qty:1}; boxItems.push(it); }
            prod.scannedQty++;
            lastScanBarcode=barcode; dirty=true;

            // 기록: 직전 스캔과 같을 때만 +1, 아니면 새 항목
            const last=records[records.length-1];
            if(last && last.boxNo===boxNo && last.barcode===barcode){ last.qty++; }
            else{ records.push({boxNo, boxSize:size, barcode, productName:prod.productName, qty:1}); }

            playSuccessSound();
            renderAll();
            scrollToBarcode(barcode);
        }

        function scrollToBarcode(bc){
            const el=document.querySelector(`#shipBody tr[data-bc="${cssEsc(bc)}"]`);
            if(el) el.scrollIntoView({block:'center', behavior:'smooth'});
        }
        function cssEsc(s){ return String(s).replace(/["\\]/g,'\\$&'); }

        // 상품명 모델코드 배지
        function pnameHtml(name){
            if(!name) return '<span style="color:#cbd5e1">-</span>';
            const ci=name.indexOf(',');
            if(ci>0){
                const prefix=name.slice(0,ci), rest=name.slice(ci);
                const m=prefix.match(/(\S+)\s*$/);
                if(m){ const t=m[1];
                    if(/^[A-Za-z0-9]+$/.test(t) && /[A-Za-z]/.test(t) && /\d/.test(t))
                        return esc(prefix.slice(0,prefix.length-m[0].length))+' <span class="name-badge">'+esc(t)+'</span>'+esc(rest);
                }
            }
            return esc(name);
        }

        function renderAll(){ renderShip(); renderList(); renderRec(); if(bcDetailBc!=null) renderBcDetail(); updateCounts(); }

        function boxSizeOf(no){ return savedBoxes.find(b=>b.boxNo===no)?.boxSize || boxSizeMap.get(no) || currentBoxSize; }
        function fmtTs(ts){ if(!ts) return '-'; const d=new Date(ts); if(isNaN(d)) return '-'; const k=new Date(d.getTime()+9*3600*1000); const p=n=>String(n).padStart(2,'0'); return `${k.getUTCFullYear()}-${p(k.getUTCMonth()+1)}-${p(k.getUTCDate())} ${p(k.getUTCHours())}:${p(k.getUTCMinutes())}`; }

        // 스캔목록 = 발주서 상품 리스트 (발주수량 vs 스캔수량, 같으면 연한 초록)
        function renderShip(){
            const tb=document.getElementById('shipBody');
            if(!currentOrder){ tb.innerHTML=`<tr class="state-row"><td colspan="4">발주서를 조회하세요.</td></tr>`; return; }
            if(!products.length){ tb.innerHTML=`<tr class="state-row"><td colspan="4">상품이 없습니다.</td></tr>`; return; }
            tb.innerHTML=products.map(p=>{
                const done=p.orderQty>0 && p.scannedQty===p.orderQty;
                const cls=done?'row-done':(p.barcode===lastScanBarcode?'row-latest':'');
                return `<tr data-bc="${esc(p.barcode)}" class="${cls}">
                    <td class="bc">${esc(p.barcode)}</td>
                    <td class="pname pname-link" onclick="openBc('${esc(p.barcode)}')">${pnameHtml(p.productName)}</td>
                    <td class="qty">${p.orderQty}</td>
                    <td class="qty">${p.scannedQty}</td>
                </tr>`;
            }).join('');
        }

        // 상세 테이블 공용 행 (박스 · 바코드 · 상품명 · 스캔개수[클릭편집])
        function rowDetailHtml(it){
            return `<tr>
                <td class="ctr">📦 ${esc(it.boxNo)}</td>
                <td class="bc">${esc(it.barcode)}</td>
                <td class="pname">${pnameHtml(it.productName)}</td>
                <td class="ctr qedit" onclick="editItemQty(${it.boxNo},'${esc(it.barcode)}')">${it.qty}</td>
                <td class="ctr"><button class="del-emoji" title="삭제" onclick="delItem(${it.boxNo},'${esc(it.barcode)}')">🗑️</button></td>
            </tr>`;
        }
        function delItem(boxNo, barcode){
            if(!confirm(`삭제하시겠습니까?\n📦${boxNo} · ${barcode}`)) return;
            setItemQty(boxNo, barcode, 0); // 제거
            toast('삭제되었습니다.');
        }

        // 목록 패널: 존재 박스 버튼 + 선택 박스의 상품 상세
        function renderList(){
            const btns=document.getElementById('listBoxBtns');
            const tb=document.getElementById('listBody');
            const title=document.getElementById('listDetailTitle');
            const setDelAll=on=>{ const b=document.getElementById('delAllBtn'); if(b) b.disabled=!on; };
            const setMerge=on=>{ const b=document.getElementById('mergeBtn'); if(b) b.disabled=!on; };
            setDelAll(false); setMerge(false);
            if(!currentOrder){ btns.innerHTML=''; document.getElementById('listSub').textContent=''; title.textContent='발주서를 조회하세요.'; tb.innerHTML=`<tr class="state-row"><td colspan="5">-</td></tr>`; closeMergePicker(); return; }
            const nos=[...new Set([...savedBoxes.map(b=>b.boxNo), ...boxItems.map(i=>i.boxNo)])].sort((a,b)=>a-b);
            document.getElementById('listSub').textContent=nos.length?`${nos.length}박스`:'';
            if(!nos.length){ btns.innerHTML='<div style="color:#94a3b8;font-size:13px;">아직 박스가 없습니다.</div>'; title.textContent=''; tb.innerHTML=`<tr class="state-row"><td colspan="5">박스가 없습니다.</td></tr>`; closeMergePicker(); return; }
            if(listSelBox==null || !nos.includes(listSelBox)) listSelBox=nos[0];
            setDelAll(true);
            setMerge(nos.length>1);              // 합칠 다른 박스가 있어야 활성화
            if(mergeOpen) renderMergePicker(nos); // 열려 있으면 대상 목록 갱신
            btns.innerHTML=nos.map(no=>`<div class="lbx ${no===listSelBox?'sel':''}" onclick="selectListBox(${no})"><div class="e">📦</div><div class="t">${esc(boxSizeOf(no))}</div><div class="n">${no}</div></div>`).join('');
            title.textContent=`📦 박스 ${listSelBox} · ${boxSizeOf(listSelBox)}`;
            const items=boxItems.filter(i=>i.boxNo===listSelBox);
            tb.innerHTML=items.length?items.map(rowDetailHtml).join(''):`<tr class="state-row"><td colspan="5">이 박스에 담긴 상품이 없습니다.</td></tr>`;
        }
        function selectListBox(no){ listSelBox=no; closeMergePicker(); renderList(); }

        // ── 박스 합치기 (선택 박스 → 대상 박스로 상품 이동, 선택 박스는 삭제) ──
        let mergeOpen=false;
        function boxNosAll(){ return [...new Set([...savedBoxes.map(b=>b.boxNo), ...boxItems.map(i=>i.boxNo)])].sort((a,b)=>a-b); }
        function closeMergePicker(){
            mergeOpen=false;
            const p=document.getElementById('mergePicker'), b=document.getElementById('mergeBtn');
            if(p) p.classList.remove('show');
            if(b) b.classList.remove('on');
        }
        function toggleMergePicker(){
            if(listSelBox==null){ toast('합칠 박스를 선택하세요.'); return; }
            if(mergeOpen){ closeMergePicker(); return; }
            mergeOpen=true;
            document.getElementById('mergePicker').classList.add('show');
            document.getElementById('mergeBtn').classList.add('on');
            renderMergePicker(boxNosAll());
        }
        function renderMergePicker(nos){
            document.getElementById('mpTitle').textContent=`박스 ${listSelBox} 의 상품을 옮길 대상 박스를 선택하세요.`;
            const targets=nos.filter(n=>n!==listSelBox);   // 본인 박스 제외
            const el=document.getElementById('mergeBoxes');
            el.innerHTML=targets.length
                ? targets.map(no=>`<div class="mp-box" onclick="mergeInto(${no})"><div class="e">📦</div><div class="t">${esc(boxSizeOf(no)||'')}</div><div class="n">${no}</div></div>`).join('')
                : '<span class="mp-empty">합칠 다른 박스가 없습니다.</span>';
        }
        async function mergeInto(targetNo){
            const from=listSelBox;
            if(from==null || targetNo===from) return;
            if(!confirm(`박스 ${from} → 박스 ${targetNo} 로 합치시겠습니까?\n박스 ${from}의 상품이 모두 박스 ${targetNo}로 이동하고, 박스 ${from}은 삭제됩니다.`)) return;

            // 저장된 박스면 서버에서 먼저 삭제 (실패 시 중단)
            if(savedBoxes.some(b=>b.boxNo===from)){
                try{
                    const res=await fetch('/api/ship-scan/delete-box',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNumber:currentOrder, boxNo:from})});
                    if(!res.ok){ const d=await res.json().catch(()=>({})); throw new Error(d.error||'박스 삭제 실패'); }
                }catch(e){ toast('합치기 실패: '+e.message); return; }
            }
            // 상품 이동 (같은 바코드는 합산)
            const moving=boxItems.filter(i=>i.boxNo===from);
            let movedQty=0;
            for(const it of moving){
                const exist=boxItemFor(targetNo,it.barcode);
                if(exist) exist.qty+=it.qty;
                else boxItems.push({boxNo:targetNo, barcode:it.barcode, productName:it.productName, qty:it.qty});
                movedQty+=it.qty;
            }
            boxItems=boxItems.filter(i=>i.boxNo!==from);
            records.forEach(r=>{ if(r.boxNo===from) r.boxNo=targetNo; });
            savedBoxes=savedBoxes.filter(b=>b.boxNo!==from);
            boxSizeMap.delete(from);
            if(currentBoxNo===from){ currentBoxNo=targetNo; setBoxBtn(); setSizeActive(); }
            listSelBox=targetNo;
            dirty=true;                 // 이동 결과는 [저장] 필요
            closeMergePicker();
            recomputeScanned(); renderAll();
            toast(`박스 ${from} → ${targetNo} 합치기 완료 (${movedQty}개) · [저장] 눌러 반영하세요.`);
        }

        // 전체삭제 — 선택 박스 + 담긴 상품 모두 삭제 (DB 즉시 반영, 다른 미저장분은 보존)
        async function deleteBox(){
            const no=listSelBox;
            if(no==null){ toast('삭제할 박스를 선택하세요.'); return; }
            if(!confirm(`박스 ${no} 전체를 삭제하시겠습니까?\n박스와 담긴 상품이 모두 삭제됩니다.`)) return;
            if(savedBoxes.some(b=>b.boxNo===no)){
                try{
                    const res=await fetch('/api/ship-scan/delete-box',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNumber:currentOrder, boxNo:no})});
                    if(!res.ok){ const d=await res.json().catch(()=>({})); throw new Error(d.error||'삭제 실패'); }
                }catch(e){ toast('삭제 실패: '+e.message); return; }
            }
            boxItems=boxItems.filter(i=>i.boxNo!==no);
            savedBoxes=savedBoxes.filter(b=>b.boxNo!==no);
            boxSizeMap.delete(no);
            records=records.filter(r=>r.boxNo!==no);
            if(currentBoxNo===no){ currentBoxNo=null; setBoxBtn(); setSizeActive(); }
            listSelBox=null;
            recomputeScanned();
            renderAll();
            toast(`박스 ${no} 삭제되었습니다.`);
        }

        // 바코드 상세 패널: 해당 바코드가 담긴 모든 박스
        function renderBcDetail(){
            if(bcDetailBc==null) return;
            const bc=bcDetailBc, prod=prodByBarcode(bc);
            document.getElementById('bcDetailTitle').innerHTML=`${esc(bc)} · ${prod?pnameHtml(prod.productName):''}`;
            const items=boxItems.filter(i=>i.barcode===bc);
            document.getElementById('bcSub').textContent=items.length?`${items.length}박스`:'';
            const tb=document.getElementById('bcBody');
            tb.innerHTML=items.length?items.map(rowDetailHtml).join(''):`<tr class="state-row"><td colspan="5">이 바코드가 담긴 박스가 없습니다.</td></tr>`;
        }
        function openBc(barcode){ bcDetailBc=barcode; renderBcDetail(); document.getElementById('bcBack').classList.add('show'); document.getElementById('bcPanel').classList.add('show'); }
        function closeBc(){ document.getElementById('bcBack').classList.remove('show'); document.getElementById('bcPanel').classList.remove('show'); }

        // 개수 편집 (공용 숫자패드) — 확정수량 초과 방지
        function editItemQty(boxNo, barcode){
            const it=boxItemFor(boxNo,barcode); const prod=prodByBarcode(barcode);
            NumPad.open({ title:`개수 수정 · <b>📦${boxNo} / ${esc(barcode)}</b>`, value:it?it.qty:0, min:0, onConfirm:(n)=>{
                const otherSum=boxItems.filter(x=>x.barcode===barcode && x.boxNo!==boxNo).reduce((s,x)=>s+x.qty,0);
                const limit=prod?prod.orderQty:Infinity;
                let val=n;
                if(otherSum+val>limit){ val=Math.max(0,limit-otherSum); toast(`확정수량(${limit}) 초과 — ${val}로 조정`); }
                setItemQty(boxNo,barcode,val);
            }});
        }
        function setItemQty(boxNo,barcode,qty){
            let it=boxItemFor(boxNo,barcode);
            if(qty<=0){ if(it) boxItems=boxItems.filter(x=>x!==it); }
            else if(it){ it.qty=qty; }
            else{ const prod=prodByBarcode(barcode); boxItems.push({boxNo,barcode,productName:prod?prod.productName:'',qty}); }
            recomputeScanned(); dirty=true;
            renderAll();
        }

        function renderRec(){
            const tb=document.getElementById('recBody');
            if(!records.length){ tb.innerHTML=`<tr class="state-row"><td colspan="4">스캔 기록이 없습니다.</td></tr>`; document.getElementById('recSub').textContent=''; return; }
            const rows=records.slice().reverse(); // 최신 위
            tb.innerHTML=rows.map(r=>`<tr>
                <td class="ctr">📦 ${esc(r.boxNo)}<span style="color:#94a3b8"> · ${esc(r.boxSize)}</span></td>
                <td class="bc">${esc(r.barcode)}</td>
                <td class="pname">${pnameHtml(r.productName)}</td>
                <td class="qty">${r.qty}</td>
            </tr>`).join('');
            document.getElementById('recSub').textContent=`${records.length}건`;
        }

        function updateCounts(){
            const sum=products.reduce((s,p)=>s+p.scannedQty,0);
            document.getElementById('shipCount').textContent=products.length;
            document.getElementById('shipSum').textContent=sum;
            document.getElementById('recCount').textContent=records.length;
            const btn=document.getElementById('saveBtn');
            btn.disabled=!dirty;
            btn.classList.toggle('primary', dirty);
        }

        // ── 기록 패널 ──
        function openRec(){ renderRec(); document.getElementById('recBack').classList.add('show'); document.getElementById('recPanel').classList.add('show'); }
        function closeRec(){ document.getElementById('recBack').classList.remove('show'); document.getElementById('recPanel').classList.remove('show'); }
        // ── 목록(박스 HEADER) 패널 ──
        function openList(){ renderList(); document.getElementById('listBack').classList.add('show'); document.getElementById('listPanel').classList.add('show'); }
        function closeList(){ document.getElementById('listBack').classList.remove('show'); document.getElementById('listPanel').classList.remove('show'); }

        // ── 저장 (현재 박스아이템 전체를 SET) ──
        async function saveShip(){
            if(!dirty){ toast('저장할 변경이 없습니다.'); return; }
            const boxNos=[...new Set([...boxItems.map(i=>i.boxNo), ...savedBoxes.map(b=>b.boxNo)])];
            const boxes=boxNos.map(no=>({boxNo:no, boxSize:boxSizeOf(no)}));
            const items=boxItems.map(i=>({boxNo:i.boxNo, barcode:i.barcode, productName:i.productName, qty:i.qty}));
            const btn=document.getElementById('saveBtn'); btn.disabled=true;
            toast('저장 중…');
            try{
                const res=await fetch('/api/ship-scan/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderNumber:currentOrder, boxes, items})});
                const data=await res.json().catch(()=>({}));
                if(!res.ok) throw new Error(data.error||'저장 실패');
                const savedQty=data.savedQty||0;
                await loadOrder(currentOrder); // baseline 재로드 (dirty=false)
                document.getElementById('doneBtn').disabled=false; // 저장 후 [완료] 활성화
                toast(`저장 완료 (${savedQty}개) · [완료]로 새 발주서`);
            }catch(e){ updateCounts(); toast('저장 실패: '+e.message); }
        }

        // ── 완료 → 초기화 ──
        function onDone(){ resetPage(); }
        function resetPage(){
            currentOrder=''; products=[]; boxItems=[]; savedBoxes=[]; records=[]; boxSizeMap.clear();
            currentBoxNo=null; currentBoxSize=null; lastScanBarcode=null; dirty=false; listSelBox=null; bcDetailBc=null;
            orderInput.value=''; orderInput.classList.remove('has-ord','locked'); orderInput.style.display='';
            document.getElementById('curOrder').textContent='-';
            document.getElementById('ordDisplay').style.display='none';
            document.getElementById('doneBtn').disabled=true;
            bcInput.value='';
            closeRec(); closeList(); closeBc();
            setBoxBtn(); setSizeActive(); renderAll();
            orderInput.focus();
            toast('초기화 완료 — 새 발주서를 입력하세요.');
        }

        // 미저장 변경 이탈 경고
        window.addEventListener('beforeunload', function(e){ if(dirty){ e.preventDefault(); e.returnValue=''; return ''; } });

        let toastTimer;
        function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);}

        setTimeout(()=>orderInput.focus(), 300);
    </script>
</body>
</html>
